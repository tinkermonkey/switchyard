[pytest]
# Pytest configuration for orchestrator tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum Python version
minversion = 3.11

# Command line options
addopts =
    # Verbose output
    -v
    # Show extra test summary info
    -ra
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Capture output
    --capture=no
    # Show locals in tracebacks
    --showlocals
    # Disable warnings summary (can be enabled with -W)
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (medium speed, some real services)
    e2e: End-to-end tests (slow, full system)
    slow: Slow tests (skip in fast CI runs)
    asyncio: Async tests

# Async configuration
asyncio_mode = auto

# Coverage options (when using pytest-cov)
[coverage:run]
source = .
omit =
    tests/*
    */site-packages/*
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Coverage thresholds
fail_under = 70

# Exclude lines from coverage
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

# Logging configuration
[pytest:log]
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/test_run.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (in seconds)
timeout = 300
timeout_method = thread
