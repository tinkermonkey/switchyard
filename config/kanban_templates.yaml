# Kanban Board Template for Claude Code Orchestrator
# Standard workflow that matches the orchestrator's agent configuration

# Standard orchestrator workflow
standard_workflow:
  name: "Claude Code Orchestrator Workflow"
  description: "Complete SDLC workflow for automated agent orchestration"
  columns:
    - name: "Backlog"
      agent: null
      description: "New issues and feature requests"
    - name: "Requirements Development"
      agent: "idea_researcher"
      description: "Initial research and idea development"
    - name: "Requirements Analysis"
      agent: "business_analyst"
      description: "Business analysis and requirements gathering"
    - name: "Design"
      agent: "software_architect"
      description: "System design and architecture"
    - name: "Ready for Development"
      agent: null
      description: "Issues ready to be picked up by developers"
    - name: "In Development"
      agent: "senior_software_engineer"
      description: "Active development work"
    - name: "Code Review"
      agent: "code_reviewer"
      description: "Code review and quality assurance"
    - name: "Testing"
      agent: "senior_qa_engineer"
      description: "Testing and validation"
    - name: "Documentation"
      agent: "technical_writer"
      description: "Technical documentation creation"
    - name: "Documentation Review"
      agent: "documentation_editor"
      description: "Documentation review and editing"
    - name: "Done"
      agent: null
      description: "Completed work"

# GitHub Project Board settings
github_project_settings:
  visibility: "private"  # private, public
  description_template: "Automated project board managed by Claude Code Orchestrator"