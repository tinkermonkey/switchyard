# Medic Configuration
# Phase 1: Visibility & Detection (No Auto-Fixing)

medic:
  # Monitoring configuration
  monitoring:
    enabled: true
    interval_seconds: 60  # Check logs every minute (not currently used - streaming mode)

    # Container patterns to monitor
    containers:
      - "clauditoreum-orchestrator"
      - "clauditoreum-observability-server"
      - "clauditoreum-pattern-ingestion"
      - "clauditoreum-elasticsearch"
      - "clauditoreum-redis"

    # Log levels to monitor
    log_levels:
      - ERROR
      - CRITICAL
      - WARNING
      - FATAL

    # Patterns to ignore (false positives)
    # These are regex patterns that will skip fingerprint creation
    ignore_patterns:
      - "Connection pool is full"  # Expected under load
      - "Temporary network error"   # Self-recovering
      - "Rate limit warning"         # GitHub API rate limits

  # Fingerprinting configuration
  fingerprinting:
    # Maximum number of sample log entries to store per signature
    max_sample_entries: 20

    # Trending threshold (occurrence rate multiplier)
    # If occurrences_last_hour > previous_hour * threshold, mark as trending
    trending_threshold: 2.0

  # Elasticsearch configuration
  elasticsearch:
    index_prefix: "medic-failure-signatures"
    retention_days: 30  # ILM delete phase

  # Status tracking
  status:
    # Automatically resolve signatures after N days without occurrence
    auto_resolve_days: 7

# Phase 2 configuration
auto_trigger:
  enabled: true
  check_interval_seconds: 300  # Check every 5 minutes
  thresholds:
    CRITICAL:
      total_occurrences: 3
      occurrences_per_hour: null  # Any CRITICAL triggers immediately
    ERROR:
      total_occurrences: 10
      occurrences_per_hour: 5
    WARNING:
      total_occurrences: 50
      occurrences_per_hour: 20

investigation:
  enabled: true
  max_concurrent: 3
  timeout_seconds: 14400  # 4 hours
  max_retries: 3
