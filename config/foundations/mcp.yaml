# MCP Server Definitions
# Defines all available MCP servers and their connection configurations

mcp_servers:
  context7:
    type: http
    url: "${CONTEXT7_MCP_URL}"
    capabilities:
      - library_documentation
      - api_references
      - package_search
    description: "Context7 MCP server for library documentation and API references"

  playwright:
    type: stdio
    command: npx
    args:
      - -y
      - "@playwright/mcp"
    env:
      PLAYWRIGHT_CHROMIUM_WS_ENDPOINT: "ws://browserless:3000"
    capabilities:
      - browser_automation
      - ui_testing
      - screenshot_capture
      - accessibility_testing
      - network_interception
      - form_interaction
    description: "Playwright MCP for browser automation and UX testing via browserless service"

  serena:
    type: stdio
    command: uvx
    args:
      - --from
      - git+https://github.com/oraios/serena
      - serena
      - start-mcp-server
      - --context
      - ide-assistant
      - --project
      - "{work_dir}"
    capabilities:
      - codebase_analysis
      - semantic_search
      - code_understanding
      - symbol_lookup
    description: "Serena MCP server for codebase analysis and semantic search"