# Agent Definitions - What agents exist and their capabilities
# This is the foundational layer defining all available agents in the orchestrator

agents:
  dev_environment_setup:
    description: "Development environment configuration, Dockerfile generation, and validation with automated troubleshooting"
    model: "claude-opus-4-6"
    timeout: 1800  # 30 minutes for Docker builds and validation
    retries: 2
    makes_code_changes: true  # Modifies dependency files (requirements.txt, etc.)
    requires_dev_container: false  # Runs locally in orchestrator to build the dev container
    requires_docker: false  # ONLY agent allowed to run outside Docker (needs to build containers)
    capabilities:
      - environment_analysis
      - dockerfile_generation
      - dependency_detection
      - dependency_troubleshooting
      - docker_build_validation
      - tech_stack_validation
    tools_enabled:
      - file_operations
      - git_integration
      - docker_operations
      - web_search
    mcp_servers:
      - context7

  dev_environment_verifier:
    description: "Verifies dev environment setup succeeded and marks container as verified"
    model: "claude-sonnet-4-6"
    timeout: 300
    retries: 2
    makes_code_changes: false  # Only verifies and updates state
    filesystem_write_allowed: false  # Only updates dev container state
    requires_dev_container: false
    requires_docker: false  # Needs to inspect Docker images built by setup agent
    capabilities:
      - environment_verification
      - docker_image_validation
      - build_output_analysis
      - test_result_validation
    tools_enabled:
      - file_operations
      - git_integration
      - docker_operations
    mcp_servers:
      - context7

  idea_researcher:
    description: "Market research and idea validation"
    model: "claude-opus-4-6"
    timeout: 300
    retries: 2
    makes_code_changes: false  # Posts research to GitHub discussions, doesn't create files
    filesystem_write_allowed: false  # Must post to GitHub, not create local files
    requires_dev_container: false  # Documentation work doesn't need project dependencies
    requires_docker: true  # Must run in Docker for security isolation
    capabilities:
      - research
      - market_analysis
      - feasibility_assessment
    tools_enabled:
      - file_operations
      - git_integration
      - web_search
    mcp_servers:
      - context7

  business_analyst:
    description: "Requirements analysis and user story development"
    model: "claude-sonnet-4-6"
    timeout: 300
    retries: 3
    makes_code_changes: false  # Posts to GitHub discussions, doesn't create files
    requires_dev_container: false  # Documentation work doesn't need project dependencies
    filesystem_write_allowed: false  # Must post to GitHub, not create local files
    requires_docker: true  # Must run in Docker for security isolation
    capabilities:
      - requirements_analysis
      - user_story_creation
      - stakeholder_analysis
      - process_modeling
    tools_enabled:
      - file_operations
      - git_integration
      - web_search
    mcp_servers:
      - context7

  software_architect:
    description: "System architecture and technical design"
    model: "claude-opus-4-6"
    timeout: 600
    retries: 3
    makes_code_changes: false  # Creates architecture documents and diagrams
    filesystem_write_allowed: false  # Posts reviews to GitHub, doesn't create files
    requires_dev_container: false  # Design work doesn't need project dependencies yet
    requires_docker: true  # Must run in Docker for security isolation
    capabilities:
      - system_architecture
      - technical_design
      - performance_planning
      - security_design
    tools_enabled:
      - file_operations
      - git_integration
      - web_search
    mcp_servers:
      - context7

  work_breakdown_agent:
    description: "Break approved designs into phase-based sub-issues for implementation"
    model: "claude-sonnet-4-6"
    timeout: 300
    retries: 2
    makes_code_changes: false  # Creates GitHub issues, not files
    filesystem_write_allowed: false  # Creates GitHub issues via API only
    requires_dev_container: false
    requires_docker: true  # Must run in Docker for security isolation
    capabilities:
      - work_decomposition
      - task_estimation
      - dependency_analysis
      - issue_creation
    tools_enabled:
      - file_operations
      - git_integration
    mcp_servers:
      - context7

  senior_software_engineer:
    description: "Software development and implementation"
    model: "claude-haiku-4-5"
    timeout: 10800  # 3-hour hard limit; enforced by docker wait timeout in docker_runner
    retries: 3
    circuit_breaker:
      failure_threshold: 6
    makes_code_changes: true  # Writes actual code
    filesystem_write_allowed: true  # CRITICAL: Must write to /workspace for implementation
    requires_dev_container: true  # NEEDS project dependencies to run/test code
    requires_docker: true  # MUST run in Docker for security isolation
    capabilities:
      - software_development
      - code_implementation
      - testing
      - performance_optimization
    tools_enabled:
      - file_operations
      - git_integration
      - web_search
    mcp_servers:
      - context7
      - playwright

  code_reviewer:
    description: "Code quality review and validation"
    model: "claude-opus-4-6"
    timeout: 300
    retries: 2
    makes_code_changes: false  # Review only, no changes
    filesystem_write_allowed: false  # Posts reviews to GitHub, doesn't create files
    requires_dev_container: false  # Can review code without running it
    requires_docker: true  # Must run in Docker for security isolation
    capabilities:
      - code_review
      - quality_assessment
      - security_review
      - best_practices_validation
    tools_enabled:
      - file_operations
      - git_integration
    mcp_servers:
      - context7

  technical_writer:
    description: "Technical documentation creation"
    model: "claude-sonnet-4-6"
    timeout: 300
    retries: 2
    makes_code_changes: true  # Creates documentation files
    requires_dev_container: false  # Documentation doesn't need dependencies
    requires_docker: true  # Must run in Docker for security isolation
    capabilities:
      - technical_writing
      - documentation_creation
      - api_documentation
      - user_guides
    tools_enabled:
      - file_operations
      - git_integration

  documentation_editor:
    description: "Documentation review and editing"
    model: "claude-sonnet-4-6"
    timeout: 300
    retries: 2
    makes_code_changes: false  # Review only, no changes
    filesystem_write_allowed: false  # Posts reviews to GitHub, doesn't create files
    requires_dev_container: false
    requires_docker: true  # Must run in Docker for security isolation
    capabilities:
      - editorial_review
      - content_optimization
      - style_validation
      - accuracy_verification
    tools_enabled:
      - file_operations
      - git_integration

  pr_code_reviewer:
    description: "PR code quality review using pr-review-toolkit skill"
    model: "claude-opus-4-6"
    timeout: 600  # 10 minutes for PR review
    retries: 2
    makes_code_changes: false
    filesystem_write_allowed: false
    requires_dev_container: true   # IMPORTANT: Needs project code for PR review
    requires_docker: true           # IMPORTANT: Runs in Docker (called by PRReviewStage)
    capabilities:
      - code_review
      - pr_analysis
    tools_enabled:
      - file_operations
      - git_integration
    mcp_servers:
      - context7

  requirements_verifier:
    description: "Verify PR against requirements and context"
    model: "claude-sonnet-4-6"
    timeout: 300  # 5 minutes per verification
    retries: 2
    makes_code_changes: false
    filesystem_write_allowed: false
    requires_dev_container: true   # IMPORTANT: Needs project code to fetch PR diff
    requires_docker: true           # IMPORTANT: Runs in Docker (called by PRReviewStage)
    capabilities:
      - requirements_verification
      - gap_analysis
    tools_enabled:
      - file_operations
      - git_integration
    mcp_servers:
      - context7

  test_agent:
    description: "Test agent for integration testing and CI/CD verification"
    model: "claude-haiku-4-5"
    timeout: 300  # 5 minutes
    retries: 2
    makes_code_changes: true  # Can modify files for testing
    requires_dev_container: false  # Runs in basic orchestrator container
    requires_docker: true  # Can run in Docker for isolation
    filesystem_write_allowed: true  # Can write files for testing
    capabilities:
      - test_execution
      - verification
      - validation
      - integration_testing
    tools_enabled:
      - file_operations
      - git_integration
    mcp_servers: []  # No MCP servers needed for basic testing

  claude_advisor:
    description: "Analyzes project failures and recommends improvements"
    model: "claude-sonnet-4-6"
    timeout: 600
    retries: 1
    makes_code_changes: false
    filesystem_write_allowed: true  # Allow running tests/scripts that might write temp files
    requires_dev_container: true  # Needs project dependencies to analyze/run code
    requires_docker: true
    capabilities:
      - failure_analysis
      - code_analysis
      - recommendation_generation
    tools_enabled:
      - file_operations
      - git_integration
      - web_search
    mcp_servers:
      - context7

# Default agent configuration applied to all agents
default_config:
  working_directory: "/workspace/{project_name}"
  output_format: "structured_json"
  quality_gates:
    minimum_score: 0.7
    validation_required: true