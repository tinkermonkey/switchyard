# Pipeline Templates - Define reusable pipeline stage sequences
# These templates can be instantiated by projects with customizations

pipeline_templates:
  planning_design:
    name: "Planning & Design Pipeline"
    description: "Pre-SDLC planning, design, and work breakdown pipeline"
    workflow_type: "maker_checker"
    workspace: "discussions"
    discussion_category: "Ideas"
    stages:
      - stage: "research"
        name: "Market Research & Idea Validation"
        required_capabilities: ["research", "market_analysis"]
        default_agent: "idea_researcher"
        timeout: 300
        retries: 2
        review_required: false

      - stage: "requirements"
        name: "Business Requirements Analysis"
        required_capabilities: ["requirements_analysis"]
        default_agent: "business_analyst"
        timeout: 300
        retries: 3
        review_required: false

      - stage: "design"
        name: "System Architecture & Design"
        required_capabilities: ["system_architecture", "technical_design"]
        default_agent: "software_architect"
        timeout: 600
        retries: 3
        review_required: false

      - stage: "work_breakdown"
        name: "Work Breakdown & Issue Creation"
        required_capabilities: ["work_decomposition", "issue_creation"]
        default_agent: "work_breakdown_agent"
        inputs_from: ["business_analyst", "software_architect"]
        timeout: 300
        retries: 2
        review_required: false

      - stage: "pr_review"
        name: "PR Review & Requirements Verification"
        required_capabilities: ["code_review", "pr_analysis", "requirements_verification"]
        default_agent: "pr_review_agent"
        inputs_from: ["work_breakdown"]
        timeout: 3600
        retries: 2
        review_required: false

      - stage: "documentation"
        name: "Epic Documentation"
        required_capabilities: ["technical_writing", "documentation_creation"]
        default_agent: "technical_writer"
        inputs_from: ["business_analyst", "software_architect"]
        timeout: 300
        retries: 2
        review_required: true
        reviewer_agent: "documentation_editor"
        reviewer_timeout: 300
        reviewer_retries: 2

  environment_support:
    name: "Development Environment Support"
    description: "Environment configuration, Dockerfile fixes, and dependency troubleshooting"
    workflow_type: "maker_checker"
    workspace: "issues"
    stages:
      - stage: "environment_setup"
        name: "Environment Configuration & Troubleshooting"
        required_capabilities: ["environment_analysis", "dockerfile_generation", "dependency_troubleshooting"]
        default_agent: "dev_environment_setup"
        timeout: 1800
        retries: 3
        review_required: false

      - stage: "environment_verification"
        name: "Environment Verification"
        required_capabilities: ["environment_verification", "docker_image_validation"]
        default_agent: "dev_environment_verifier"
        inputs_from: ["dev_environment_setup"]
        timeout: 300
        retries: 2
        review_required: false

  sdlc_execution:
    name: "SDLC Execution Pipeline"
    description: "Streamlined implementation workflow for sub-issues"
    workflow_type: "maker_checker"
    workspace: "issues"
    stages:
      - stage: "implementation"
        name: "Software Development"
        required_capabilities: ["software_development", "code_implementation"]
        default_agent: "senior_software_engineer"
        inputs_from: ["software_architect"]  # Pull full design from planning workflow (requirements already in issue body)
        timeout: 1800
        retries: 5
        review_required: true
        reviewer_agent: "code_reviewer"
        reviewer_timeout: 300
        reviewer_retries: 5
        escalation:
          blocking_threshold: 1
          github_pr_required: true

      - stage: "testing"
        name: "Automated Testing & Validation"
        stage_type: "repair_cycle"  # NEW: Signals this is a repair cycle stage
        required_capabilities: ["test_execution", "software_development"]
        default_agent: "senior_software_engineer"
        timeout: 3600  # Longer timeout for iterative cycles
        retries: 1  # Retries handled internally by cycle
        review_required: false  # No review for deterministic testing
        # Test configurations will be loaded from project config
        max_total_agent_calls: 100  # Circuit breaker for cost control
        checkpoint_interval: 5  # Checkpoint every N iterations

      - stage: "staging"
        name: "Staging Review"
        required_capabilities: ["software_development", "code_implementation"]
        default_agent: "senior_software_engineer"
        timeout: 7200
        retries: 1
        review_required: false

# Pipeline execution settings
execution_defaults:
  max_concurrent_stages: 1
  stage_timeout: 1800
  retry_backoff: 30
  automatic_progression: true