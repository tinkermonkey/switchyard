# GitHub Project Board settings
github_project_settings:
  visibility: "private"
  description_template: "Automated project board managed by Claude Code Orchestrator"

# Label definitions for pipeline routing
pipeline_labels:
  idea_development:
    - name: "pipeline:idea-dev"
      color: "0075ca"
      description: "Idea development pipeline workflow"
  dev_pipeline:
    - name: "pipeline:dev"
      color: "0e8a16"
      description: "Development pipeline workflow"
  full_sdlc:
    - name: "pipeline:full-sdlc"
      color: "d73a49"
      description: "Full SDLC pipeline workflow"

# Common stage labels
stage_labels:
  - name: "stage:research"
    color: "cfd3d7"
    description: "Research stage"
  - name: "stage:analysis"
    color: "cfd3d7"
    description: "Analysis stage"
  - name: "stage:requirements"
    color: "cfd3d7"
    description: "Requirements stage"
  - name: "stage:design"
    color: "cfd3d7"
    description: "Design stage"
  - name: "stage:implementation"
    color: "cfd3d7"
    description: "Implementation stage"
  - name: "stage:code-review"
    color: "cfd3d7"
    description: "Code review stage"
  - name: "stage:qa-testing"
    color: "cfd3d7"
    description: "QA testing stage"
  - name: "stage:documentation"
    color: "cfd3d7"
    description: "Documentation stage"