# Workflow Templates - Define kanban board structures and automation rules
# These templates define how GitHub project boards should be structured

workflow_templates:
  planning_design_workflow:
    name: "Planning & Design Workflow"
    description: "Pre-SDLC planning, design, and work breakdown workflow"
    pipeline_mapping: "planning_design"
    pipeline_trigger_columns:  # Not strictly serialized (conversational workflow)
      - "Research"
    pipeline_exit_columns:     # Planning complete
      - "In Development"
      - "Done"
    columns:
      - name: "Backlog"
        stage_mapping: null
        agent: null
        description: "Complex features and initiatives requiring full planning"
        automation_rules:
          - trigger: "item_created"
            action: "assign_label"
            parameters:
              labels: ["pipeline:planning-design"]

      - name: "Research"
        type: "conversational"
        stage_mapping: "research"
        agent: "idea_researcher"
        feedback_timeout_seconds: 3600
        description: "Market research and idea validation"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:research"]
          - trigger: "item_moved_to_column"
            action: "start_conversational_loop"
            parameters:
              stage: "research"

      - name: "Requirements"
        type: "conversational"
        stage_mapping: "requirements"
        agent: "business_analyst"
        feedback_timeout_seconds: 3600
        description: "Business requirements analysis"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:requirements"]
          - trigger: "item_moved_to_column"
            action: "start_conversational_loop"
            parameters:
              stage: "requirements"

      - name: "Requirements Review"
        type: "review"
        stage_mapping: "requirements_review"
        agent: "requirements_reviewer"
        maker_agent: "business_analyst"
        max_iterations: 3
        auto_advance_on_approval: true
        escalate_on_blocked: true
        description: "Requirements validation and quality assurance"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:requirements-review"]
          - trigger: "item_moved_to_column"
            action: "start_review_cycle"
            parameters:
              stage: "requirements"

      - name: "Design"
        type: "conversational"
        stage_mapping: "design"
        agent: "software_architect"
        feedback_timeout_seconds: 3600
        description: "System architecture and design"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:design"]
          - trigger: "item_moved_to_column"
            action: "start_conversational_loop"
            parameters:
              stage: "design"

      - name: "Work Breakdown"
        type: "conversational"
        stage_mapping: "work_breakdown"
        agent: "work_breakdown_agent"
        feedback_timeout_seconds: 3600
        description: "Break epic into phase-based sub-issues"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:work-breakdown"]
          - trigger: "item_moved_to_column"
            action: "start_conversational_loop"
            parameters:
              stage: "work_breakdown"

      - name: "In Development"
        stage_mapping: null
        agent: null
        description: "Tracking epic progress via sub-issue tasklist"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["status:in-development"]
          - trigger: "all_subtasks_completed"
            action: "move_to_column"
            parameters:
              target_column: "Documentation"

      - name: "Documentation"
        stage_mapping: "documentation"
        agent: "technical_writer"
        description: "Generate comprehensive epic documentation"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:documentation"]
          - trigger: "item_moved_to_column"
            action: "start_pipeline_stage"
            parameters:
              stage: "documentation"

      - name: "Documentation Review"
        type: "review"
        stage_mapping: "documentation_review"
        agent: "documentation_editor"
        maker_agent: "technical_writer"
        max_iterations: 3
        auto_advance_on_approval: true
        escalate_on_blocked: true
        description: "Documentation review and editing"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:documentation-review"]
          - trigger: "item_moved_to_column"
            action: "start_review_cycle"
            parameters:
              stage: "documentation"

      - name: "Done"
        stage_mapping: null
        agent: null
        description: "Fully completed epic with documentation"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["status:completed"]

  sdlc_execution_workflow:
    name: "SDLC Execution Workflow"
    description: "Implementation-focused workflow for sub-issues"
    pipeline_mapping: "sdlc_execution"
    pipeline_trigger_columns:  # Columns that trigger pipeline start (acquire lock)
      - "Development"
    pipeline_exit_columns:     # Columns that release the pipeline lock
      - "Staged"
      - "Done"
    columns:
      - name: "Backlog"
        stage_mapping: null
        agent: null
        description: "Phase-specific implementation tasks"
        automation_rules:
          - trigger: "item_created"
            action: "assign_label"
            parameters:
              labels: ["pipeline:sdlc-execution"]

      - name: "Development"
        stage_mapping: "implementation"
        agent: "senior_software_engineer"
        auto_advance_on_approval: true
        description: "Code implementation"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:implementation"]
          - trigger: "item_moved_to_column"
            action: "start_pipeline_stage"
            parameters:
              stage: "implementation"

      - name: "Code Review"
        type: "review"
        stage_mapping: "implementation_review"
        agent: "code_reviewer"
        maker_agent: "senior_software_engineer"
        max_iterations: 3
        auto_advance_on_approval: true
        escalate_on_blocked: true
        description: "Code quality validation"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:code-review"]
          - trigger: "item_moved_to_column"
            action: "start_review_cycle"
            parameters:
              stage: "implementation"

      - name: "Testing"
        stage_mapping: "testing"
        agent: "senior_software_engineer"
        auto_advance_on_approval: true
        description: "Automated test-fix-validate repair cycle"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:testing"]
          - trigger: "item_moved_to_column"
            action: "start_pipeline_stage"
            parameters:
              stage: "testing"

      - name: "Staged"
        stage_mapping: null
        agent: null
        description: "Staged for production - manual human review and approval"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["status:staged"]

      - name: "Done"
        stage_mapping: null
        agent: null
        description: "Completed implementation task"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["status:completed"]

  # Simple environment support workflow
  environment_support_workflow:
    name: "Environment Support Workflow"
    description: "Environment troubleshooting and configuration workflow"
    pipeline_mapping: "environment_support"
    pipeline_trigger_columns:  # Environment setup start
      - "In Progress"
    pipeline_exit_columns:     # Environment setup complete
      - "Done"
    columns:
      - name: "Backlog"
        stage_mapping: null
        agent: null
        description: "Environment issues awaiting triage"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["status:backlog"]

      - name: "In Progress"
        type: "conversational"
        stage_mapping: "environment_setup"
        agent: "dev_environment_setup"
        auto_advance_on_approval: true
        feedback_timeout_seconds: 7200
        description: "Environment setup in progress - conversational mode enabled"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:environment-setup"]
          - trigger: "item_moved_to_column"
            action: "execute_stage"
            parameters:
              stage: "environment_setup"

      - name: "Verification"
        stage_mapping: "environment_verification"
        agent: "dev_environment_verifier"
        auto_advance_on_approval: true
        description: "Verify Docker image built successfully"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:environment-verification"]
          - trigger: "item_moved_to_column"
            action: "execute_stage"
            parameters:
              stage: "environment_verification"

      - name: "Done"
        stage_mapping: null
        agent: null
        description: "Environment issue resolved"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["status:completed"]

# GitHub Project Board settings
github_project_settings:
  visibility: "private"
  description_template: "Automated project board managed by Claude Code Orchestrator"

# Label definitions for pipeline routing
pipeline_labels:
  planning_design:
    - name: "pipeline:planning-design"
      color: "5319e7"
      description: "Planning & Design Workflow"
  sdlc_execution:
    - name: "pipeline:sdlc-execution"
      color: "0e8a16"
      description: "SDLC Execution Workflow"
  environment_support:
    - name: "pipeline:environment-support"
      color: "d73a4a"
      description: "Environment Support Workflow"

