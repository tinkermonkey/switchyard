    description: "Design stage"
  - name: "stage:work-breakdown"
    color: "cfd3d7"
    description: "Work breakdown stage"
  - name: "stage:implementation"
    color: "cfd3d7"
    description: "Implementation stage"
  - name: "stage:code-review"
    color: "cfd3d7"
    description: "Code review stage"
  - name: "stage:testing"
    color: "cfd3d7"
    description: "Automated testing stage (repair cycle)"
  - name: "stage:staging"
    color: "cfd3d7"
