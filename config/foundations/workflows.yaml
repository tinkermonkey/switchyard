# Workflow Templates - Define kanban board structures and automation rules
# These templates define how GitHub project boards should be structured

workflow_templates:
  idea_development_workflow:
    name: "Idea Development Pipeline"
    description: "Research, analysis, and requirements validation workflow"
    pipeline_mapping: "idea_development"
    columns:
      - name: "Backlog"
        stage_mapping: null
        agent: null
        description: "New ideas and research requests"
        automation_rules:
          - trigger: "item_created"
            action: "assign_label"
            parameters:
              labels: ["pipeline:idea-dev"]

      - name: "Research"
        stage_mapping: "research"
        agent: "idea_researcher"
        description: "Idea research and market analysis"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:research"]
          - trigger: "item_moved_to_column"
            action: "start_pipeline_stage"
            parameters:
              stage: "research"

      - name: "Analysis"
        stage_mapping: "analysis"
        agent: "business_analyst"
        description: "Business requirements analysis"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:analysis"]
          - trigger: "item_moved_to_column"
            action: "start_pipeline_stage"
            parameters:
              stage: "analysis"

      - name: "Review"
        stage_mapping: "review"
        agent: "requirements_reviewer"
        description: "Requirements validation and review"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:review"]
          - trigger: "item_moved_to_column"
            action: "start_pipeline_stage"
            parameters:
              stage: "review"

      - name: "Done"
        stage_mapping: null
        agent: null
        description: "Validated requirements ready for development"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["status:completed"]

  dev_workflow:
    name: "Development Pipeline"
    description: "Streamlined development workflow from requirements to code"
    pipeline_mapping: "dev_pipeline"
    columns:
      - name: "Backlog"
        stage_mapping: null
        agent: null
        description: "Features ready for development"
        automation_rules:
          - trigger: "item_created"
            action: "assign_label"
            parameters:
              labels: ["pipeline:dev"]

      - name: "Requirements"
        stage_mapping: "requirements"
        agent: "business_analyst"
        description: "Business requirements analysis"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:requirements"]
          - trigger: "item_moved_to_column"
            action: "start_pipeline_stage"
            parameters:
              stage: "requirements"

      - name: "Design"
        stage_mapping: "design"
        agent: "software_architect"
        description: "Software architecture and design"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:design"]
          - trigger: "item_moved_to_column"
            action: "start_pipeline_stage"
            parameters:
              stage: "design"

      - name: "Implementation"
        stage_mapping: "implementation"
        agent: "senior_software_engineer"
        description: "Code development and implementation"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:implementation"]
          - trigger: "item_moved_to_column"
            action: "start_pipeline_stage"
            parameters:
              stage: "implementation"

      - name: "Code Review"
        stage_mapping: "implementation_review"
        agent: "code_reviewer"
        description: "Code quality review and validation"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["stage:code-review"]
          - trigger: "item_moved_to_column"
            action: "start_review_process"
            parameters:
              stage: "implementation"

      - name: "Done"
        stage_mapping: null
        agent: null
        description: "Completed features ready for deployment"
        automation_rules:
          - trigger: "item_moved_to_column"
            action: "assign_label"
            parameters:
              labels: ["status:completed"]

  full_sdlc_workflow:
