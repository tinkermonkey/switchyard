# Collaboration Workflows Configuration
# Defines how agents collaborate on different types of tasks

workflows:
  # Full SDLC with reviews
  full_sdlc_review:
    name: "Full SDLC with Reviews"
    description: "Complete development lifecycle with maker-checker patterns"
    stages:
      - stage: "requirements"
        maker: "business_analyst"
        checkers: ["requirements_reviewer"]
        parallel_review: false
        github_integration: true
        quality_gates:
          completeness_score: 0.7
          clarity_score: 0.7
        escalation:
          blocking_threshold: 1
          human_review: true

      - stage: "design"
        maker: "software_architect"
        checkers: ["architecture_reviewer", "security_reviewer"]
        parallel_review: true
        github_integration: true
        quality_gates:
          design_completeness: 0.8
          scalability_score: 0.7
        escalation:
          blocking_threshold: 2
          human_review: true

      - stage: "implementation"
        maker: "senior_software_engineer"
        checkers: ["code_reviewer", "security_reviewer"]
        parallel_review: true
        github_integration: true
        github_pr_required: true
        quality_gates:
          code_quality: 0.8
          test_coverage: 0.8
        escalation:
          blocking_threshold: 1
          human_review: true

  # Lightweight workflow for smaller tasks
  lightweight_review:
    name: "Lightweight Review"
    description: "Streamlined workflow for smaller changes"
    stages:
      - stage: "analysis"
        maker: "business_analyst"
        checkers: ["requirements_reviewer"]
        parallel_review: false
        github_integration: true
        quality_gates:
          completeness_score: 0.6

      - stage: "implementation"
        maker: "senior_software_engineer"
        checkers: ["code_reviewer"]
        parallel_review: false
        github_integration: true
        github_pr_required: true
        quality_gates:
          code_quality: 0.7

  # Research and documentation focus
  research_workflow:
    name: "Research & Documentation"
    description: "Focus on research, analysis, and documentation"
    stages:
      - stage: "research"
        maker: "research_agent"
        checkers: ["technical_writer"]
        parallel_review: false
        github_integration: true

      - stage: "documentation"
        maker: "technical_writer"
        checkers: ["documentation_editor", "subject_matter_expert"]
        parallel_review: true
        github_integration: true

# Agent collaboration patterns
collaboration_patterns:
  maker_checker:
    description: "One maker, one or more checkers"
    communication_mode: "structured_handoff"
    github_visibility: "full"
    retry_on_failure: true
    max_iterations: 3

  parallel_review:
    description: "Multiple reviewers working simultaneously"
    communication_mode: "structured_handoff"
    github_visibility: "consolidated"
    consensus_required: false
    blocking_vote_threshold: 1

  sequential_pipeline:
    description: "Agents work in sequence, each building on previous work"
    communication_mode: "context_accumulation"
    github_visibility: "staged_updates"
    checkpoint_frequency: "each_stage"

# GitHub integration settings
github_integration:
  comment_formatting:
    agent_status_updates: true
    detailed_findings: true
    next_steps: true
    quality_metrics: true

  label_management:
    auto_label: true
    labels:
      - name: "orchestrator:in-progress"
        color: "yellow"
        description: "Being worked on by orchestrator agents"
      - name: "orchestrator:review-requested"
        color: "orange"
        description: "Waiting for agent review"
      - name: "orchestrator:approved"
        color: "green"
        description: "Approved by agent reviewers"
      - name: "orchestrator:blocked"
        color: "red"
        description: "Blocked by agent review findings"

  mention_users:
    on_escalation: true
    on_completion: true
    reviewer_assignments: true

# Quality gates and escalation
quality_management:
  default_thresholds:
    completeness_score: 0.7
    clarity_score: 0.7
    quality_score: 0.7

  escalation_rules:
    blocking_issues: 1  # Escalate if any blocking issues
    consecutive_failures: 2  # Escalate after 2 consecutive failures
    time_threshold: 3600  # Escalate if stuck for 1 hour
    human_reviewers:
      - "@tech-lead"
      - "@product-owner"

  retry_logic:
    max_attempts: 3
    backoff_strategy: "exponential"
    reset_conditions: ["human_intervention", "configuration_change"]

# Context preservation settings
context_management:
  conversation_history:
    preserve_across_stages: true
    max_entries: 50
    summarization_threshold: 30

  decision_tracking:
    record_all_decisions: true
    include_rationale: true
    track_alternatives: true
    github_visibility: true

  artifact_management:
    version_control: true
    shared_storage: "orchestrator_data/artifacts"
    cleanup_policy: "keep_last_5"

# Performance and monitoring
monitoring:
  metrics:
    - agent_response_time
    - review_completion_time
    - quality_scores
    - escalation_frequency
    - human_intervention_rate

  alerts:
    - condition: "blocking_issues > 5"
      action: "notify_admin"
    - condition: "average_quality < 0.6"
      action: "review_workflow"
    - condition: "escalation_rate > 0.3"
      action: "process_optimization"