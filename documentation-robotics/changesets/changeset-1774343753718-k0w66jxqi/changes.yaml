- type: add
  elementId: application.applicationprocess.conversational-session-recovery-three-way-branch
  layerName: application
  after:
    id: a23d3cf9-a12b-46cb-a546-821399efaeda
    path: application.applicationprocess.conversational-session-recovery-three-way-branch
    spec_node_id: application.applicationprocess
    type: applicationprocess
    layer_id: application
    name: Conversational Session Recovery Three-Way Branch
    description: "In project_monitor._handle_card_event (discussions workspace path,
      lines 2248-2346): when entering a conversational column with prior work,
      the recovery logic branches three ways. Step 1: load persisted session
      from ConversationalSessionState
      (state/conversational_sessions/<project>_issue_<n>.yaml,
      max_age_hours=24). Step 2: if session has pipeline_run_id, query
      pipeline_run_manager.get_pipeline_run() — Branch A: run exists AND
      status==active → reuse the existing pipeline_run_id
      (recovered_pipeline_run_id = session.pipeline_run_id). Branch B: run
      exists but status != active → log that run is non-active, create new run
      (final_pipeline_run_id falls back to current pipeline_run.id). Branch C:
      run not found (expired from Redis) → log expiry, create new run. Step 3:
      regardless of branch, restore session.session_id to
      HumanFeedbackState.claude_session_id if session exists. Step 4: call
      _load_previous_outputs_from_discussion() to rebuild conversation history.
      Step 5: register state in active_loops and call _conversational_loop() in
      a new background daemon thread."
    source_reference:
      provenance: extracted
      locations:
        - file: services/project_monitor.py
          symbol: _handle_card_event.resume_feedback_loop
