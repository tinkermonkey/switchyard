    path: application.applicationprocess.stale-execution-state-cleanup-on-in-progress
    spec_node_id: application.applicationprocess
    type: applicationprocess
    layer_id: application
    name: Stale Execution State Cleanup on In-Progress
    description: "In project_monitor.py (lines 2460-2494), when should_execute_work
      returns work_already_in_progress and already_handled is True: first
      queries pipeline_run_manager.get_active_pipeline_run() as source of truth.
      If an active run exists and is_active() → do not disturb; return None and
      let the container complete. If no active run exists → execution state is
      stale; call record_execution_outcome(outcome='failure', error='Stale
      execution state') to clear the in_progress record, then return None. This
      prevents issues from being permanently stuck when the orchestrator
      restarted mid-execution."
    source_reference:
      provenance: extracted
      locations:
        - file: services/project_monitor.py
          symbol: _handle_card_event
