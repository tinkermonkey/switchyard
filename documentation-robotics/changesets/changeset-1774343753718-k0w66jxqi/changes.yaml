    id: 875f42e9-714a-4673-a8b2-c7b687667864
    path: application.applicationprocess.agent-retry-backoff-with-circuit-breaker-awareness
    spec_node_id: application.applicationprocess
    type: applicationprocess
    layer_id: application
    name: Agent Retry Backoff with Circuit Breaker Awareness
    description: "AgentExecutor.execute_agent()
      (services/agent_executor.py:414-537): retry count comes from
      agent_config.retries (default 2), giving max_attempts = 1 + retries. On
      each failed attempt that is not a CancellationError,
      NonRetryableAgentError, or ClaudeCodeRateLimitError: wait wait_time = 15 *
      attempt seconds (attempt 1→15s, attempt 2→30s) before retrying. This
      backoff duration is intentionally long to span the circuit breaker's 30s
      recovery timeout, allowing the circuit breaker to transition to HALF_OPEN
      between retries. ClaudeCodeRateLimitError never retries and immediately
      trips the global Claude Code circuit breaker if not already open.
      CancellationError never retries and does not record as failure.
      NonRetryableAgentError skips all retries."
    source_reference:
      provenance: extracted
      locations:
        - file: services/agent_executor.py
          symbol: AgentExecutor.execute_agent.retry_loop
    metadata:
      created_at: 2026-03-24T09:18:59.935Z
      updated_at: 2026-03-24T09:18:59.935Z
      version: 1
