  layerName: application
  after:
    id: 49a4d7ba-3241-4097-b00f-e8717d5ed9af
    path: application.applicationprocess.task-queue-not-before-deferred-execution
    spec_node_id: application.applicationprocess
    type: applicationprocess
    layer_id: application
    name: Task Queue Not-Before Deferred Execution
    description: "TaskQueue.dequeue() in both Redis (_dequeue_redis,
      task_queue/task_manager.py:106-148) and in-memory (_dequeue_fallback,
      lines 151-187) implementations support a not_before field (ISO8601 UTC
      timestamp). Redis path: scans queue up to current llen() to prevent
      infinite loop; if not_before is set and nb_dt > now(), lpush task back to
      head and increment skip counter, then continue scanning for a ready task.
      In-memory path: drains all queue items, collecting deferred items in a
      list; first ready item (not_before absent or past) is returned; deferred
      items are put back. Callers set not_before on retried/deferred tasks to
      implement backoff without removing from the queue."
    source_reference:
      provenance: extracted
      locations:
        - file: task_queue/task_manager.py
          symbol: TaskQueue._dequeue_redis
