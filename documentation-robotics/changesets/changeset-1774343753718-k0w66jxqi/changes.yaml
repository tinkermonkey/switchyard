- type: add
  elementId: application.applicationprocess.branch-error-human-intervention-lock-retain
  layerName: application
  after:
    id: c76568a5-544b-4d09-8c5c-cfaf02b15f65
    path: application.applicationprocess.branch-error-human-intervention-lock-retain
    spec_node_id: application.applicationprocess
    type: applicationprocess
    layer_id: application
    name: Branch Error Human Intervention Lock Retain
    description: "AgentExecutor.execute_agent()
      (services/agent_executor.py:277-325): when workspace preparation raises
      StaleBranchError or BranchPullFailedError, the executor (1) posts a GitHub
      comment explaining the problem and the rebase command needed, (2) calls
      pipeline_run_manager.end_pipeline_run(retain_lock=True, outcome='failed')
      to close the pipeline run while keeping the pipeline lock held, (3)
      re-raises as NonRetryableAgentError. The retained lock prevents any new
      work from starting on this issue. The comment instructs the user to rebase
      and move back to Development. For StaleBranchError, the comment includes
      the branch name and commits_behind count and the exact rebase commands.
      For BranchPullFailedError, the comment explains the git pull failure and
      diagnosis steps."
    source_reference:
      provenance: extracted
      locations:
        - file: services/agent_executor.py
          symbol: AgentExecutor.execute_agent.branch_error_handler
