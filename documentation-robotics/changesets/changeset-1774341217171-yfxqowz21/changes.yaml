    path: application.applicationcomponent.claude-code-circuit-breaker
    spec_node_id: application.applicationcomponent
    type: applicationcomponent
    layer_id: application
    name: Claude Code Circuit Breaker
    description: Token-limit-specific circuit breaker
      (monitoring/claude_code_breaker.py) with CLOSED/OPEN/HALF_OPEN states that
      detects Claude Code session limit messages (e.g. 'hit your limit · resets
      5pm UTC'), trips with a precise reset time, and blocks new agent container
      launches until the limit resets; distinct from the generic CircuitBreaker
      and consulted by DockerAgentRunner before every container launch
    attributes:
