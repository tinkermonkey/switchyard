    path: application.applicationcomponent.docker-claude-wrapper
    spec_node_id: application.applicationcomponent
    type: applicationcomponent
    layer_id: application
    name: Docker Claude Wrapper
    description: Container-side Python wrapper script
      (scripts/docker-claude-wrapper.py) that runs inside agent containers;
      streams Claude Code JSON events directly to Redis Stream
      (orchestrator:claude_logs_stream) and pub/sub
      (orchestrator:claude_stream); persists final agent result to Redis key
      agent_result:{project}:{issue}:{task_id} with 2-hour TTL; writes fallback
      result file /tmp/agent_result_{task_id}.json when Redis is unavailable;
      handles SIGTERM/SIGINT for graceful shutdown during orchestrator restarts
    attributes:
      type: internal
    source_reference:
      provenance: extracted
      locations:
        - file: scripts/docker-claude-wrapper.py
          symbol: ClaudeWrapper
