    description: Direct Redis communication from inside agent containers via
      docker-claude-wrapper.py; each Claude JSON event is written to Redis
      Stream (orchestrator:claude_logs_stream, maxlen 500) and published to
      Redis Pub/Sub channel (orchestrator:claude_stream) for real-time WebSocket
