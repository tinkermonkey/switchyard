    layer_id: application
    name: Container Execution Validator
    description: "Validates agent output after container exit with code 0
      (_validate_result in docker_runner.py): rejects empty output or output
      shorter than 50 characters as a persistence failure (wrapper could not
      write to Redis or file, or Claude crashed); scans first 1KB of output for
      error markers (CRITICAL ERROR, FATAL:, Traceback, redis.exceptions,
      ConnectionRefusedError) that indicate a failure despite a zero exit code;
      on validation failure, persists a failure result to Redis and records the
      outcome before returning empty string to trigger retry"
