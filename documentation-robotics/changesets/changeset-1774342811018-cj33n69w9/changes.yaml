    spec_node_id: application.applicationprocess
    type: applicationprocess
    layer_id: application
    name: Result Persistence to Redis Before GitHub Post
    description: Immediately after container exit (both success and failure), the
      raw output is persisted to Redis under a key that includes project,
      issue_number, and agent, before any GitHub comment is posted; this ensures
      the result survives an orchestrator crash during the GitHub posting phase;
      the GitHub post happens via _complete_agent_execution() which is called
      after Redis persistence; failure outcome is recorded in
      work_execution_tracker immediately before raising any exception
    source_reference:
