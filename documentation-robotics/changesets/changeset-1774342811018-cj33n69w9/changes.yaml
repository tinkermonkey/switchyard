    name: MCP Config Task-ID Sanitization
    description: "Before writing the MCP config file, the task_id is sanitized:
      colons (:) are replaced with underscores because Docker interprets colons
      as volume mount separators causing 'too many colons' errors; additional
      problematic characters (/, \\, space, *, ?, \", <, >, |) are also
      replaced; the config is written to the first writable candidate directory
      in priority order: /workspace/.orchestrator/tmp, /app/tmp, ./tmp, /tmp"
