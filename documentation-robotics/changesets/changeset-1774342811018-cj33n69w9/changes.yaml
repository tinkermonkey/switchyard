    spec_node_id: application.applicationprocess
    type: applicationprocess
    layer_id: application
    name: Conversational Session Continuity Across Restarts
    description: Conversational feedback loops persist their Claude Code session_id
      to conversational_session_state (YAML file); on ProjectMonitor restart
      detection, the session is loaded (max_age_hours=24); if an active pipeline
      run exists with the recovered pipeline_run_id, it is reused; previous
      agent outputs are reloaded from the discussion or issue to rebuild
      conversation history; the feedback loop resumes from where it left off
      without re-running the initial agent response
