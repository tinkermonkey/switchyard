    spec_node_id: application.applicationprocess
    type: applicationprocess
    layer_id: application
    name: Rate Limit Detection and Breaker Trip Cascade
    description: "On exit code 1: (1) check if stderr contains only debug output and
      no real error keywords; if so, (2) query Elasticsearch index
      claude-streams-* for recent raw_event.event.error=rate_limit events in the
      last 5 minutes; (3) if found, parse the reset time from the message text
      using ClaudeCodeBreaker.detect_session_limit(); (4) trip the circuit
      breaker with the reset time; (5) raise ClaudeCodeRateLimitError — if
      Elasticsearch query fails or no rate limit found, treat as regular failure
      without tripping breaker"
