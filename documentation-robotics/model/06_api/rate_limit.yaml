  path: api.ratelimit.git-hub-api-rate-limit
  spec_node_id: api.ratelimit
  type: ratelimit
  layer_id: api
  name: GitHub API Rate Limit
  description: GitHub imposes 5000 points/hour for authenticated GraphQL requests;
    the orchestrator tracks remaining quota via x-ratelimit-remaining headers
    and applies exponential backoff
  attributes:
    requests: 5000
    window: 3600s
    keyBy: github_token
    scope: per-api-key
    action: throttle
  source_reference:
