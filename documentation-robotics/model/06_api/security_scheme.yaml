api.securityscheme.git-hub-app-jwt:
  id: eea118ea-6f7b-4861-a636-e7c9d6e6c2d0
  path: api.securityscheme.git-hub-app-jwt
  spec_node_id: api.securityscheme
  type: securityscheme
  layer_id: api
  name: GitHub App JWT
  description: GitHub App JWT-based authentication; generates JWT signed with RSA
    private key and exchanges for installation token used as bearer token for
    all GitHub API calls
  attributes:
    type: http
    scheme: bearer
    bearerFormat: JWT
    description: GitHub App installation token
  source_reference:
    provenance: extracted
    locations:
      - file: services/github_app_auth.py
        symbol: GitHubAppAuth
