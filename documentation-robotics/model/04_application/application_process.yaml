application.applicationprocess.pull-rebase-via-fetch-and-hard-reset:
  id: 41a559ef-aca1-40f7-8958-6e03f2a7276d
  path: application.applicationprocess.pull-rebase-via-fetch-and-hard-reset
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Pull Rebase via Fetch and Hard Reset
  description: "GitWorkflowManager.pull_rebase()
    (services/git_workflow_manager.py:740-823): replaces git pull --rebase to
    avoid merge conflicts when shared workspace has local commits that diverged
    from remote. Algorithm: (1) get current branch name via git rev-parse
    --abbrev-ref HEAD. (2) git fetch origin. (3) check if origin/{branch}
    exists; if not (new branch, first push), skip and return. (4) count local
    commits ahead of remote via git rev-list --count origin/{branch}..HEAD; if
    ahead_count > 0, log error that prior agent committed without pushing. (5)
    git reset --hard origin/{branch} — idempotent, conflict-free. (6) git clean
    -fd to remove untracked artifacts from prior agent runs. If fetch fails,
    raises exception. If reset fails, raises exception."
  source_reference:
    provenance: extracted
    locations:
      - file: services/git_workflow_manager.py
        symbol: GitWorkflowManager.pull_rebase
  metadata:
    created_at: 2026-03-24T09:20:22.260Z
    updated_at: 2026-03-24T09:20:22.260Z
    version: 1
