  name: Workspace Finalization Failsafe Commit Check
  description: "AgentExecutor.execute_agent()
    (services/agent_executor.py:570-650): after agent completes successfully,
    calls workspace_context.finalize_execution() if workspace_context is not
    None. If finalize returns success=False, or raises an exception, calls
    _failsafe_commit_check() to handle any uncommitted changes left by the
    agent. If workspace_context is None (repair cycle skip, workspace prep
    failed, or no issue_number) and issue_number exists: still calls
    _failsafe_commit_check() as a safety net. This prevents agent code changes
    from being silently lost when the primary finalization path fails. The
    failsafe uses git status to detect and commit uncommitted changes under an
    auto-commit message."
