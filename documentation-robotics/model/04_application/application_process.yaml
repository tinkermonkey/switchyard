application.applicationprocess.work-execution-gate-decision:
  id: 0f397ca9-573a-47dc-ad89-d0d4490d1c8a
  path: application.applicationprocess.work-execution-gate-decision
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Work Execution Gate Decision
  description: "Six-case decision tree in
    WorkExecutionStateTracker.should_execute_work()
    (services/work_execution_state.py:298-404) determining whether an agent
    executes or is skipped for a given issue+column+agent+trigger_source. Case 1
    (first_execution): no prior execution record for this column+agent →
    execute. Case 2 (manual_rework_detected): a status change to this column has
    timestamp AFTER the last execution timestamp → execute. Case 3
    (retry_after_*): last execution outcome is failure, blocked, cancelled, or
    abandoned → execute. Case 4 (skip_auto_progression_after_success):
    trigger_source==pipeline_progression AND last outcome==success AND the last
    status change to this column is older than the last execution (or no status
    change exists) → skip. Case 5 (work_already_in_progress): last outcome is
    in_progress → skip. Case 6 (explicit_manual_trigger): trigger_source in
    [manual_move, webhook, manual] → execute even after prior success. Default
    fallback: skip (already_processed_successfully). Returns Tuple[bool, str] of
    (should_execute, reason_code)."
  source_reference:
    provenance: extracted
    locations:
      - file: services/work_execution_state.py
        symbol: WorkExecutionStateTracker.should_execute_work
  metadata:
    created_at: 2026-03-24T09:16:23.928Z
    updated_at: 2026-03-24T09:16:23.928Z
    version: 1
application.applicationprocess.has-active-execution-multi-check:
  id: 3089b75e-f00f-41cf-b39c-778af94e6a16
  path: application.applicationprocess.has-active-execution-multi-check
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Has Active Execution Multi-Check
  description: "WorkExecutionStateTracker.has_active_execution()
    (services/work_execution_state.py:432-576) performs four sequential checks
    to determine if ANY type of work is currently active for an issue,
    preventing race conditions. Check 1: scan execution_history for entries with
    outcome==in_progress; stale pre-enqueue probes are auto-cleared if
    trigger_source==pipeline_progression AND no task_id is stamped AND age >
    300s (STALE_ENQUEUE_PROBE_SECS) — cleared by setting outcome=abandoned.
    Check 2: check review_cycle_executor.active_cycles in-memory dict for this
    project+issue. Check 3: scan Redis for repair cycle container tracking keys
    (agent:container:*). Check 4: check
    human_feedback_loop_executor.active_loops in-memory dict. Fail-safe: if >=2
    of checks 2/3/4 raise ImportError or AttributeError (services not
    initialized), return True to prevent duplicate scheduling during degraded
    state. Returns bool."
  source_reference:
    provenance: extracted
    locations:
      - file: services/work_execution_state.py
        symbol: WorkExecutionStateTracker.has_active_execution
  metadata:
    created_at: 2026-03-24T09:16:34.736Z
    updated_at: 2026-03-24T09:16:34.736Z
    version: 1
application.applicationprocess.stale-execution-state-cleanup-on-in-progress:
  id: 64cb725b-db57-4b8c-8c57-e1a2e1d839c4
  path: application.applicationprocess.stale-execution-state-cleanup-on-in-progress
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Stale Execution State Cleanup on In-Progress
  description: "In project_monitor.py (lines 2460-2494), when should_execute_work
    returns work_already_in_progress and already_handled is True: first queries
    pipeline_run_manager.get_active_pipeline_run() as source of truth. If an
    active run exists and is_active() → do not disturb; return None and let the
    container complete. If no active run exists → execution state is stale; call
    record_execution_outcome(outcome='failure', error='Stale execution state')
    to clear the in_progress record, then return None. This prevents issues from
    being permanently stuck when the orchestrator restarted mid-execution."
  source_reference:
    provenance: extracted
    locations:
      - file: services/project_monitor.py
        symbol: _handle_card_event
  metadata:
    created_at: 2026-03-24T09:16:43.987Z
    updated_at: 2026-03-24T09:16:43.987Z
