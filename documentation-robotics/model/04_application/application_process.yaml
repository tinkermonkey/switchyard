  layer_id: application
  name: PR Lifecycle Status Transitions
  description: "GitWorkflowManager.update_pr_status()
    (services/git_workflow_manager.py:280-416): manages four PR state
    transitions. 'ready': if current pr_state=='draft', calls gh pr ready to
    remove draft status, updates pr_state='open'. 'approved': adds 'approved'
    label via gh pr edit --add-label; if label missing from repo ('not found' in
    stderr), auto-creates it with color 0e8a16 then retries the add. 'merged':
    sets pr_state='merged' and calls _delete_branch() to git push origin
    --delete {branch_name}. create_or_update_pr() uses gh pr create --base main
    --head {branch} --draft and parses the returned URL to extract the PR
    number; if PR already exists (stderr contains 'already exists'), fetches
    existing PR details via gh pr list --head {branch} and updates cache."
