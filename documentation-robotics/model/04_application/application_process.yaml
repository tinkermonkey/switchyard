  name: Pipeline Progression Exit Column Lock Release
  description: "PipelineProgression.progress_to_next_stage()
    (services/pipeline_progression.py:520-636): after moving the issue to
    next_column, checks if next_column is in
    workflow_template.pipeline_exit_columns. If it is an exit column: calls
    _release_lock_and_process_next() which (1) releases the pipeline lock, (2)
    removes the issue from the pipeline queue, (3) calls
    pipeline_run_manager.end_pipeline_run(outcome='success'), (4) checks
    pipeline_queue for the next waiting issue. If a next issue exists and lock
    acquisition succeeds: marks it active, fetches its issue_data, creates a
    task with trigger='pipeline_progression', calls record_execution_start()
    BEFORE enqueue(), then enqueues the task. If next_column is not an exit
    column: creates a task for the next agent, calls record_execution_start()
    BEFORE enqueue()."
