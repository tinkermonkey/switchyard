application.applicationprocess.pre-enqueue-execution-record-ordering:
  id: 68743ffb-8d8c-4a7c-a8e9-b2d19ea20364
  path: application.applicationprocess.pre-enqueue-execution-record-ordering
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Pre-Enqueue Execution Record Ordering
  description: "Critical sequencing rule enforced in both pipeline_progression.py
    (lines 618-630) and project_monitor.py:
    work_execution_tracker.record_execution_start() MUST be called BEFORE
    task_queue.enqueue(). This creates the in_progress record before the Redis
    worker can pick up the task and call stamp_execution_task_id(). If enqueue
    were called first, a fast worker could complete and try to record the
    outcome before the in_progress record exists, leaving a permanent
    in_progress entry. The record_execution_start() sets outcome=in_progress and
    trigger_source; agent_executor then stamps the task_id via
    stamp_execution_task_id() once the task_id UUID is generated."
  source_reference:
    provenance: extracted
    locations:
      - file: services/pipeline_progression.py
        symbol: PipelineProgression.progress_to_next_stage
  metadata:
    created_at: 2026-03-24T09:16:52.383Z
    updated_at: 2026-03-24T09:16:52.383Z
    version: 1
application.applicationprocess.conversational-session-recovery-three-way-branch:
  id: a23d3cf9-a12b-46cb-a546-821399efaeda
  path: application.applicationprocess.conversational-session-recovery-three-way-branch
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Conversational Session Recovery Three-Way Branch
  description: "In project_monitor._handle_card_event (discussions workspace path,
    lines 2248-2346): when entering a conversational column with prior work, the
    recovery logic branches three ways. Step 1: load persisted session from
    ConversationalSessionState
    (state/conversational_sessions/<project>_issue_<n>.yaml, max_age_hours=24).
    Step 2: if session has pipeline_run_id, query
    pipeline_run_manager.get_pipeline_run() — Branch A: run exists AND
    status==active → reuse the existing pipeline_run_id
    (recovered_pipeline_run_id = session.pipeline_run_id). Branch B: run exists
    but status != active → log that run is non-active, create new run
    (final_pipeline_run_id falls back to current pipeline_run.id). Branch C: run
    not found (expired from Redis) → log expiry, create new run. Step 3:
    regardless of branch, restore session.session_id to
    HumanFeedbackState.claude_session_id if session exists. Step 4: call
    _load_previous_outputs_from_discussion() to rebuild conversation history.
    Step 5: register state in active_loops and call _conversational_loop() in a
    new background daemon thread."
  source_reference:
    provenance: extracted
    locations:
      - file: services/project_monitor.py
        symbol: _handle_card_event.resume_feedback_loop
  metadata:
    created_at: 2026-03-24T09:17:03.586Z
    updated_at: 2026-03-24T09:17:03.586Z
    version: 1
