  name: Disallowed Markdown Commit Validation
  description: "validate_no_unwanted_docs()
    (services/git_workflow_manager.py:37-109) is called before committing agent
    output. Scans staged files for .md extensions. Allowed locations (pass
    without check): .claude/**/*.md, documentation/**/*.md, README.md,
    **/CLAUDE.md, docs/**/*.md, **/.github/**/*.md. Disallowed patterns
    (blocked): *_REPORT.md, *_STATUS.md, *_CHECKLIST.md, *_REVIEW.md, *_FIX.md,
    *_VERIFICATION.md, *_ANALYSIS.md, *_SUMMARY.md, *_TODO.md, *_NOTES.md,
    CODE_REVIEW.md, DEPLOYMENT_CHECKLIST.md, IMPLEMENTATION_*.md, REFACTOR_*.md.
    If any staged file matches a disallowed pattern AND is not in an allowed
    location, it is reported as a violation. Returns {valid: bool, violations:
    list}. This implements the CLAUDE.md no-documentation-files policy at the
    git layer."
