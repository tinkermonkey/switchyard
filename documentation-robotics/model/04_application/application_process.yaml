  id: 0ad43fee-23c9-4106-b939-cf1ce2c77159
  path: application.applicationprocess.conversational-session-continuity-across-restarts
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Conversational Session Continuity Across Restarts
  description: Conversational feedback loops persist their Claude Code session_id
    to conversational_session_state (YAML file); on ProjectMonitor restart
