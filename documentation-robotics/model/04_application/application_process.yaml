application.applicationprocess.git-commit-with-doc-validation-and-hook-skip:
  id: 9030d0df-a9b6-4d12-bb83-c6db93a84083
  path: application.applicationprocess.git-commit-with-doc-validation-and-hook-skip
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Git Commit with Doc Validation and Hook Skip
  description: "GitWorkflowManager.commit()
    (services/git_workflow_manager.py:881-994): if validate_docs=True (default),
    runs git diff --cached --name-only to get staged files, then calls
    validate_no_unwanted_docs(). If violations found: for each violating file,
    calls git reset HEAD -- {file} to unstage, then os.remove() to delete the
    file from disk, preventing dirty state from blocking future git operations.
    Returns False after cleanup. If no violations: runs git commit -m {message}
    with --no-verify (skip_hooks=True by default) because pre-commit hooks are
    for developer workflow, not CI/CD. 'nothing to commit' in stdout is treated
    as success (returns True). push_branch() uses git push -u origin {branch}
    with -u flag to set tracking on first push."
  source_reference:
    provenance: extracted
    locations:
      - file: services/git_workflow_manager.py
        symbol: GitWorkflowManager.commit
  metadata:
    created_at: 2026-03-24T09:20:45.891Z
    updated_at: 2026-03-24T09:20:45.891Z
    version: 1
