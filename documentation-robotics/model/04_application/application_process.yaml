application.applicationprocess.issue-closed-lock-release-on-poll:
  id: 6bca5e3e-495a-4796-a107-644d5ecb644a
  path: application.applicationprocess.issue-closed-lock-release-on-poll
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Issue-Closed Lock Release on Poll
  description: "When trigger_agent_for_status is called for a CLOSED issue: check
    if the pipeline lock on this board is currently held by this issue's number;
    if yes, call _release_pipeline_lock_and_process_next() which releases the
    lock and immediately checks for the next waiting issue in the queue to start
    its pipeline — preventing starvation when issues are closed mid-pipeline"
