application.applicationprocess.checkpoint-file-naming-and-recovery-ordering:
  id: d43a6460-7f73-454a-a109-9514425aab4a
  path: application.applicationprocess.checkpoint-file-naming-and-recovery-ordering
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Checkpoint File Naming and Recovery Ordering
  description: "Checkpoint files are named {pipeline_id}_stage_{stage_index}.json
    in orchestrator_data/state/checkpoints/; recovery finds the checkpoint with
    the highest stage_index by parsing the filename suffix with max(checkpoints,
    key=lambda x: int(x.stem.split('_stage_')[1])); non-serializable context
    values (state_manager, logger, mcp_integration) are silently dropped before
    writing; on load the full context dict is restored and pipeline resumes from
    the checkpointed stage_index"
