  path: application.applicationprocess.issues-workspace-conversational-recovery
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Issues Workspace Conversational Recovery
  description: "In project_monitor._handle_card_event (issues workspace path,
    lines 2356-2454) when column.type==conversational: check
    _check_agent_processed_issue_sync() for prior work. If prior work exists:
    create HumanFeedbackState with pipeline_run.id (NOT the recovered pipeline
    run — issues workspace path does not attempt pipeline run recovery), load
    persisted session_id from ConversationalSessionState (max_age_hours=24) and
    restore to state.claude_session_id if found, then branch on workspace_type:
    if discussions → call _load_previous_outputs_from_discussion(); else → call
    _load_previous_outputs_from_issue(). Register in active_loops, call
    _conversational_loop() in a background daemon thread, then return agent (not
    None) to signal caller not to start fresh work. If no prior work found: fall
