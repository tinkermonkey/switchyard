application.applicationprocess.pipeline-lock-acquisition-and-queue-ordering:
  id: 0a51232c-bfed-4d78-bae0-9edd92208cc8
  path: application.applicationprocess.pipeline-lock-acquisition-and-queue-ordering
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Pipeline Lock Acquisition and Queue Ordering
  description: "On trigger-column entry: (1) enqueue the issue (idempotent); (2)
    query get_next_waiting_issue() which returns the issue with the lowest
    position on the GitHub board; (3) if current issue is not next, return None
    and wait; (4) call try_acquire_lock(); (5) if lock is held by another issue,
    return None; (6) on lock success, mark_issue_active() and proceed;
    conversational columns bypass this entire flow and run without a lock"
  source_reference:
    provenance: extracted
    locations:
      - file: services/project_monitor.py
        symbol: ProjectMonitor.trigger_agent_for_status
  metadata:
    created_at: 2026-03-24T09:01:37.418Z
