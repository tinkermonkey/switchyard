application.applicationprocess.repair-cycle-stall-detection-and-container-kill:
  id: e46b0174-c8d3-4308-b8c7-b295dda732da
  path: application.applicationprocess.repair-cycle-stall-detection-and-container-kill
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Repair Cycle Stall Detection and Container Kill
  description: "The pipeline watchdog periodically checks running repair cycle
    containers: queries Elasticsearch across decision-events-*, agent-events-*,
    and claude-streams-* indices for the pipeline_run_id; if no events in the
    last stall_seconds (default 3600), the outer repair cycle container is
    killed via docker kill; then Redis is scanned for matching child agent
    containers (agent:container:claude-agent-* with matching pipeline_run_id)
    and each is also killed; fails open if Elasticsearch is unavailable"
  source_reference:
    provenance: extracted
    locations:
      - file: services/project_monitor.py
        symbol: _is_repair_cycle_stalled
  metadata:
    created_at: 2026-03-24T09:02:32.170Z
