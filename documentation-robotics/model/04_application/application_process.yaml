application.applicationprocess.complete-agent-execution-git-hub-routing:
  id: 509173f1-ff5d-4fa5-8ff8-0e2f20886099
  path: application.applicationprocess.complete-agent-execution-git-hub-routing
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Complete Agent Execution GitHub Routing
  description: "DockerAgentRunner._complete_agent_execution()
    (claude/docker_runner.py:2163-2262) is the unified completion handler for
    both fresh and recovered containers. Routing logic: if exit_code==0 AND
    output is non-empty → derive workspace_type by calling
    _get_workspace_type_from_column(project, column) which looks up the pipeline
    config for the column and returns its workspace property (defaults to
    'issues' if column=='unknown' or unmatched). Then call
    _build_completion_context() which reads discussion_id from state_manager
    ONLY if workspace_type is 'discussions' or 'hybrid'; otherwise
    discussion_id=None. If reply_to_comment_id is provided (fresh
    human-feedback-loop response only), add to context so post lands in-thread.
    Call github.post_agent_output() with the context. On success, call
    FeedbackManager().set_last_agent_comment_time(). If exit_code\\!=0 OR output
    is empty → skip GitHub posting. Always record execution outcome via
    work_execution_tracker.record_execution_outcome() if column \\!= 'unknown'.
    Sets output_posted=True on result so agent_executor skips the duplicate
    _post_agent_output_to_github() call."
