application.applicationprocess.execution-outcome-double-recording-prevention:
  id: a33647e9-5de6-4f28-be54-46619196ef78
  path: application.applicationprocess.execution-outcome-double-recording-prevention
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Execution Outcome Double-Recording Prevention
  description: "In AgentExecutor.execute_agent() success and failure paths
    (services/agent_executor.py:672-807): before calling
    record_execution_outcome(), the executor walks execution_history in reverse
    for the matching agent+column. Logic: if it finds an in_progress entry first
    → the current execution is not yet recorded, so record it. If it finds a
    terminal outcome (success, failure, cancelled, blocked) before hitting any
    in_progress entry → docker_runner already recorded the outcome for this
    execution, skip to avoid double-recording. This handles the case where
    DockerAgentRunner._complete_agent_execution() records the outcome early
    (from the container exit callback) before the agent_executor's outer except
    block runs."
  source_reference:
    provenance: extracted
    locations:
      - file: services/agent_executor.py
        symbol: AgentExecutor.execute_agent.outcome_double_recording_prevention
  metadata:
    created_at: 2026-03-24T09:19:54.877Z
    updated_at: 2026-03-24T09:19:54.877Z
    version: 1
application.applicationprocess.phantom-probe-cleanup-on-outcome-recording:
  id: f209ca0c-69fa-4fe4-8762-5f3bd5d5e6bd
  path: application.applicationprocess.phantom-probe-cleanup-on-outcome-recording
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Phantom Probe Cleanup on Outcome Recording
  description: "WorkExecutionStateTracker.record_execution_outcome()
    (services/work_execution_state.py:202-268): scans execution_history in
    reverse for in_progress entries matching agent+column. The FIRST (most
    recent) match is treated as the real execution entry and updated with the
    final outcome. All older in_progress entries for the same agent+column are
    treated as phantom pre-enqueue probes and also updated with the same
    outcome, but with an error message explaining they were superseded. This
    handles the edge case where pipeline_progression wrote a pre-enqueue probe
    and then enqueued a second task for the same agent+column before the first
    was consumed."
  source_reference:
    provenance: extracted
    locations:
      - file: services/work_execution_state.py
        symbol: WorkExecutionStateTracker.record_execution_outcome
  metadata:
    created_at: 2026-03-24T09:20:01.231Z
    updated_at: 2026-03-24T09:20:01.231Z
    version: 1
application.applicationprocess.dev-environment-setup-state-lifecycle:
