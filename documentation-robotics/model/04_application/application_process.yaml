  path: application.applicationprocess.dev-environment-setup-state-lifecycle
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Dev Environment Setup State Lifecycle
  description: "AgentExecutor.execute_agent() (services/agent_executor.py:403-411,
    816-830): dev_environment_setup agent has special state lifecycle. Before
    execution: set DevContainerStatus.IN_PROGRESS with
    image_name='{project}-agent:latest'. On successful completion: call
    _queue_environment_verifier() to enqueue dev_environment_verifier as the
    next task. On failure (non-circuit-breaker): reset DevContainerStatus to
    UNVERIFIED with error_message truncated to 200 chars. Circuit breaker blocks
    are NOT reset to UNVERIFIED because the agent never ran — state remains
    IN_PROGRESS to be retried when tokens reset."
