application.applicationprocess.agent-pre-flight-empty-issue-body-rejection:
  id: c0b8886e-f4a1-4b9c-95f4-e0e0e8b3f330
  path: application.applicationprocess.agent-pre-flight-empty-issue-body-rejection
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Agent Pre-Flight Empty Issue Body Rejection
  description: "In AgentExecutor.execute_agent()
    (services/agent_executor.py:426-443): before launching ANY Docker container,
    if task_context contains an 'issue' dict with an empty or whitespace-only
    'body' field, raises NonRetryableAgentError immediately. This prevents
    agents from executing on issues with no description, which would silently
    produce garbage output with 'No description' placeholders. The pipeline lock
    is retained (NonRetryableAgentError is not retried) and the issue remains
    blocked until a human fills in the description and re-triggers."
