application.applicationprocess.git-checkout-branch-with-stash-and-remote-tracking:
  id: c48010bf-a4b6-47cc-94bf-fe63518f3722
  path: application.applicationprocess.git-checkout-branch-with-stash-and-remote-tracking
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Git Checkout Branch with Stash and Remote Tracking
  description: "GitWorkflowManager.checkout_branch()
    (services/git_workflow_manager.py:530-649): (1) runs git status --porcelain;
    if dirty, stashes with git stash push --include-untracked before proceeding.
    (2) Tries git rev-parse --verify {branch} to check if branch exists locally.
    If not local: fetches origin, then checks origin/{branch}. If remote exists:
    checkout -b {branch} --track origin/{branch} and verifies tracking was
    configured via git config --get branch.{branch}.remote. If neither local nor
    remote: attempts git checkout {branch} (will fail with clear error). (3) If
    branch exists locally: git checkout {branch}, then verifies tracking; if not
    configured, logs warning. The tracking verification step handles legacy
    branches created before the push-tracking fix."
  source_reference:
