    version: 1
application.applicationprocess.task-queue-priority-and-redis-fallback:
  id: 9f542130-c2a8-47b5-8060-f976fc855c13
  path: application.applicationprocess.task-queue-priority-and-redis-fallback
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Task Queue Priority and Redis Fallback
  description: "TaskQueue (task_queue/task_manager.py) uses three priority levels:
    HIGH (1, PR reviews/blocking issues), MEDIUM (2, development tasks), LOW (3,
    documentation/cleanup). Redis path: tasks are stored as hashes at task:{id}
    and their IDs pushed to lists named tasks:high, tasks:medium, tasks:low.
    Dequeue pops from HIGH first, then MEDIUM, then LOW (strict priority order).
    In-memory fallback: uses Python PriorityQueue objects keyed by
    (priority_value, timestamp, task); fallback activates on Redis connection
    failure at startup and stays active for the session. Pending task inspection
    scans all priority queues. clear_all() deletes all Redis lists or drains all
    in-memory queues."
  source_reference:
    provenance: extracted
    locations:
      - file: task_queue/task_manager.py
        symbol: TaskQueue
  metadata:
    created_at: 2026-03-24T09:17:58.985Z
    updated_at: 2026-03-24T09:17:58.985Z
    version: 1
