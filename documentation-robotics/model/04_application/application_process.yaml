  path: application.applicationprocess.conversational-session-state-file-management
  spec_node_id: application.applicationprocess
  type: applicationprocess
  layer_id: application
  name: Conversational Session State File Management
  description: "ConversationalSessionStateManager
    (services/conversational_session_state.py): state files stored at
    {ORCHESTRATOR_ROOT}/state/conversational_sessions/{project}_issue_{n}.yaml.
    Fields: session_id (Claude Code session), issue_number, agent, project_name,
    workspace_type ('issues' or 'discussions'), pipeline_run_id,
    last_interaction (UTC ISO), updated_at. load_session() returns None if file
    missing, or if age (now - last_interaction) > max_age_hours (default 24h).
    save_session() creates or overwrites the file atomically.
    update_last_interaction() reads-modifies-writes only the timestamp fields.
    delete_session() removes the file. get_all_sessions() scans all *.yaml in
    the directory. State directory uses ORCHESTRATOR_ROOT env var (default /app)
    to avoid path issues when agents run with a project working directory."
