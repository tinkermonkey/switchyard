  path: application.applicationevent.container-launch-failed
  spec_node_id: application.applicationevent
  type: applicationevent
  layer_id: application
  name: Container Launch Failed
  description: Observability event emitted when 'docker run -d' returns a non-zero
    exit code, preventing agent execution; includes the error message from
    docker run stderr; triggers no retry by itself — the calling pipeline stage
    handles retry/failure logic
  attributes:
    eventType: system
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._execute_in_container
  metadata:
    created_at: 2026-03-24T08:35:02.029Z
    updated_at: 2026-03-24T08:35:02.029Z
    version: 1
application.applicationevent.container-execution-completed:
  id: b575eefe-37b5-4295-9d1c-112611fd36db
  path: application.applicationevent.container-execution-completed
  spec_node_id: application.applicationevent
  type: applicationevent
  layer_id: application
  name: Container Execution Completed
  description: Observability event emitted after 'docker wait' returns (container
    has exited); includes container_name, exit_code, and duration_ms; emitted
    regardless of whether the exit was successful or failed; paired with
    Container Execution Failed event for non-zero exit codes
  attributes:
    eventType: system
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._execute_in_container
  metadata:
    created_at: 2026-03-24T08:35:06.967Z
    updated_at: 2026-03-24T08:35:06.967Z
    version: 1
application.applicationevent.container-execution-failed:
  id: b88d984f-bb85-410d-aa40-a37285127025
  path: application.applicationevent.container-execution-failed
  spec_node_id: application.applicationevent
  type: applicationevent
  layer_id: application
  name: Container Execution Failed
  description: Observability event emitted when container exits with a non-zero
    exit code; exit codes 137 (SIGKILL) and 143 (SIGTERM) are treated as
    NonRetryableAgentError (deliberate termination); exit code 1 with only debug
    output in stderr triggers a check for Claude Code rate limit via
    Elasticsearch query before raising ClaudeCodeRateLimitError and tripping the
    Claude Code circuit breaker
  attributes:
    eventType: system
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._raise_for_failed_exit_code
  metadata:
    created_at: 2026-03-24T08:35:12.644Z
    updated_at: 2026-03-24T08:35:12.644Z
    version: 1
