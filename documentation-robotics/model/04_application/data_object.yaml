application.dataobject.agent-container-registry-entry:
  id: c84e6088-75b5-40c6-b95c-2e9d4c0631d0
  path: application.dataobject.agent-container-registry-entry
  spec_node_id: application.dataobject
  type: dataobject
  layer_id: application
  name: Agent Container Registry Entry
  description: "Redis hash (key: agent:container:{container_name}) that tracks
    each running agent container with 2-hour TTL; fields: container_name,
    container_id (full Docker ID), agent, project, task_id, started_at (ISO
    timestamp), issue_number, pipeline_run_id, execution_type; registered after
    'docker run -d' succeeds with real container_id; unregistered on container
    completion; used by the kill-switch API and container recovery service to
    enumerate active containers across orchestrator restarts"
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._register_active_container
  metadata:
    created_at: 2026-03-24T08:35:19.931Z
    updated_at: 2026-03-24T08:35:19.931Z
    version: 1
application.dataobject.agent-result-record:
  id: 383498f1-6aab-4fce-9729-a933671c6591
  path: application.dataobject.agent-result-record
  spec_node_id: application.dataobject
  type: dataobject
  layer_id: application
  name: Agent Result Record
  description: "Redis key (agent_result:{project}:{issue_number}:{task_id}) with
    2-hour TTL that persists agent execution results for crash recovery; fields:
    container_name, project, issue_number, agent, task_id, exit_code, output
    (raw stream-json lines or extracted text, capped at 5MB), completed_at (ISO
    UTC), recovered (boolean flag); written by both DockerClaudeWrapper (inside
    container via Redis SETEX) and DockerAgentRunner (orchestrator side as a
    duplicate safety net); read by Container Recovery Reconnector on
    orchestrator restart; if output is unparsed stream-json,
    _parse_stream_json_output extracts the text before posting to GitHub"
  source_reference:
    provenance: extracted
    locations:
      - file: scripts/docker-claude-wrapper.py
        symbol: ClaudeWrapper._write_final_result_attempt
  metadata:
    created_at: 2026-03-24T08:35:28.158Z
    updated_at: 2026-03-24T08:35:28.158Z
    version: 1
application.dataobject.mcp-server-configuration:
  id: 13ed7d1a-86d8-4b89-b86b-d95372801871
  path: application.dataobject.mcp-server-configuration
  spec_node_id: application.dataobject
  type: dataobject
  layer_id: application
  name: MCP Server Configuration
  description: "JSON file (.mcp.json) written to
    /home/orchestrator/.mcp_config.json inside agent containers; structure
    follows Claude Code MCP config format with top-level 'mcpServers' key;
    supports two server types: 'http' (URL-based, e.g. context7) and 'stdio'
    (command + args, e.g. Puppeteer, Serena); {work_dir} template in stdio args
    is substituted with /workspace (container path); passed to Claude CLI via
    --mcp-config flag; task-scoped (one file per agent run), written to
    /workspace/.orchestrator/tmp with orchestrator-side path translated to host
    path for Docker volume mount"
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._prepare_mcp_config
  metadata:
    created_at: 2026-03-24T08:35:36.131Z
    updated_at: 2026-03-24T08:35:36.131Z
    version: 1
application.dataobject.agent-prompt-file:
  id: b549c0ca-f57e-4dcd-952f-8ad1c5afeee0
  path: application.dataobject.agent-prompt-file
  spec_node_id: application.dataobject
  type: dataobject
  layer_id: application
  name: Agent Prompt File
  description: Temporary text file (.claude_prompt_{safe_task_id}.txt) written to
    the project directory before container launch; contains the full assembled
    prompt for the Claude agent; mounted via the project workspace volume so the
    container can read it at /workspace/.claude_prompt_{task_id}.txt; cat-piped
    into the docker-claude-wrapper via 'cat {file} | wrapper -'; cleaned up
    after container exit (both on success and exception); all prompt files
    matching .claude_prompt_*.txt are cleaned to handle accumulation from
    multiple runs
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._execute_in_container
  metadata:
    created_at: 2026-03-24T08:35:42.572Z
    updated_at: 2026-03-24T08:35:42.572Z
    version: 1
application.dataobject.docker-container-label-set:
  id: 04062b3d-a78e-4764-8fe6-87fa5dac27ac
  path: application.dataobject.docker-container-label-set
  spec_node_id: application.dataobject
  type: dataobject
  layer_id: application
  name: Docker Container Label Set
  description: "Every agent container is launched with five labels:
    org.switchyard.project, org.switchyard.agent, org.switchyard.task_id,
    org.switchyard.execution_type, org.switchyard.managed=true; optional:
    org.switchyard.issue_number, org.switchyard.pipeline_run_id — these labels
    enable the recovery system to identify orphaned containers after an
    orchestrator restart without relying on Redis state"
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._build_docker_command
  metadata:
    created_at: 2026-03-24T09:00:50.679Z
    updated_at: 2026-03-24T09:00:50.679Z
    version: 1
application.dataobject.redis-container-registry-entry:
  id: 3f12d025-1329-44dc-af51-75e2b3d56f03
  path: application.dataobject.redis-container-registry-entry
  spec_node_id: application.dataobject
  type: dataobject
  layer_id: application
  name: Redis Container Registry Entry
  description: "Each running agent container is registered in Redis under the key
    agent:container:{container_name} as a hash with fields: container_name,
    agent, project, task_id, pipeline_run_id, started_at; repair cycle
    containers use key repair_cycle:container:{project}:{issue} with a 7200s
    TTL; these entries enable orphan detection after orchestrator restart by
    scanning keys matching agent:container:claude-agent-*"
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._register_active_container
  metadata:
    created_at: 2026-03-24T09:02:25.410Z
    updated_at: 2026-03-24T09:02:25.410Z
    version: 1
