application.applicationfunction.claude-session-id-capture-and-resume:
  id: 1f82961b-b8ea-4005-accb-b38cdb9546d9
  path: application.applicationfunction.claude-session-id-capture-and-resume
  spec_node_id: application.applicationfunction
  type: applicationfunction
  layer_id: application
  name: Claude Session ID Capture and Resume
  description: The first JSON event emitted by Claude Code that contains a
    session_id field is captured from the stdout stream; the session_id is
    stored in context['claude_session_id']; on subsequent agent invocations for
    the same issue, the --resume {session_id} flag is passed to the claude
    command, enabling multi-turn conversation continuity across separate
    container launches
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._execute_in_container
