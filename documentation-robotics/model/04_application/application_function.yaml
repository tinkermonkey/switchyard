  id: 055493e3-5f4f-4fc9-b6e4-685f8af08b1e
  path: application.applicationfunction.pr-review-in-process-thread-execution
  spec_node_id: application.applicationfunction
  type: applicationfunction
  layer_id: application
  name: PR Review In-Process Thread Execution
  description: stage_type='pr_review' stages run PRReviewStage in-process inside a
    background thread (not in a Docker container); this is the only agent
    execution path that does not use DockerAgentRunner; it allows the PR review
    to access internal Python services (pipeline_run_manager, state files)
    directly without container boundary overhead
  source_reference:
    provenance: extracted
