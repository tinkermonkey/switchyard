application.applicationfunction.exit-code-zero-empty-output-failure-detection:
  id: 95805839-4915-47db-93d2-c4721a45ce9e
  path: application.applicationfunction.exit-code-zero-empty-output-failure-detection
  spec_node_id: application.applicationfunction
  type: applicationfunction
  layer_id: application
  name: Exit-Code-Zero Empty Output Failure Detection
  description: "After container exits with code 0, the result text is validated:
    if result_text is empty (wrapper failed to persist, Claude crashed
    silently), the run is treated as a failure — exit code 0 is not sufficient
    for success; failure is persisted to Redis and recorded in
    work_execution_tracker before returning empty string"
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._execute_in_container
  metadata:
    created_at: 2026-03-24T09:01:04.055Z
