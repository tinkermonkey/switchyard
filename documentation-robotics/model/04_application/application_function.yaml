application.applicationfunction.docker-command-builder:
  id: cc6d8cf3-aa20-4394-9ff8-5d06c6a9f0d9
  path: application.applicationfunction.docker-command-builder
  spec_node_id: application.applicationfunction
  type: applicationfunction
  layer_id: application
  name: Docker Command Builder
  description: "Builds the full 'docker run' command for each agent container
    (_build_docker_command in docker_runner.py): resolves host workspace path
    from /proc/self/mountinfo to support Snap Docker, applies volume mounts
    (/workspace rw/ro per filesystem_write_allowed, ~/.ssh read-only,
    ~/.gitconfig, wrapper script, optional MCP config, optional
    review_cycle_context at /review_cycle_context, optional pipeline_context at
    /pipeline_context), attaches Docker network, sets container labels
    (org.switchyard.*), and passes environment variables (GITHUB_TOKEN, auth
    token, REDIS_HOST, AGENT, PROJECT, ISSUE_NUMBER, PIPELINE_RUN_ID)"
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._build_docker_command
  metadata:
    created_at: 2026-03-24T08:33:59.433Z
    updated_at: 2026-03-24T08:33:59.433Z
    version: 1
application.applicationfunction.container-image-selector:
  id: d8429b16-3469-4868-a92f-34f7ac1ce25b
  path: application.applicationfunction.container-image-selector
  spec_node_id: application.applicationfunction
  type: applicationfunction
  layer_id: application
  name: Container Image Selector
  description: "Determines which Docker image to use for each agent
    (_get_image_for_agent in docker_runner.py): if agent has
    requires_dev_container=true AND DevContainerStateManager reports the project
    image as verified, uses the project-specific image (e.g.
    myproject-agent:latest); otherwise falls back to
    switchyard-orchestrator:latest; dev_environment_setup additionally receives
    a Docker socket mount (/var/run/docker.sock) to enable image building from
    inside the container"
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._get_image_for_agent
  metadata:
    created_at: 2026-03-24T08:34:05.134Z
    updated_at: 2026-03-24T08:34:05.134Z
    version: 1
application.applicationfunction.host-path-detector:
  id: 9db48865-4b36-45cd-9f8b-5e7804a58c45
  path: application.applicationfunction.host-path-detector
  spec_node_id: application.applicationfunction
  type: applicationfunction
  layer_id: application
  name: Host Path Detector
  description: "Resolves actual host filesystem paths for Docker-in-Docker volume
    mounts (_detect_host_workspace_path and _detect_host_home_path in
    docker_runner.py): reads /proc/self/mountinfo to find the real host path
    bound to /workspace (avoids Snap Docker snap-versioned path issue); requires
    HOST_HOME env var to be set explicitly in .env for SSH/git mounts because
    /proc inference is unreliable under Snap Docker; falls back to
    HOST_WORKSPACE_PATH env var or /workspace if detection fails"
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._detect_host_workspace_path
  metadata:
    created_at: 2026-03-24T08:34:11.658Z
    updated_at: 2026-03-24T08:34:11.658Z
    version: 1
application.applicationfunction.container-write-verifier:
  id: 2afa853f-87b6-4435-a4ef-d457f2bc29cd
  path: application.applicationfunction.container-write-verifier
  spec_node_id: application.applicationfunction
  type: applicationfunction
  layer_id: application
  name: Container Write Verifier
  description: Pre-launch safety check (_verify_container_write_access in
    docker_runner.py) that spawns a lightweight test container using
    switchyard-orchestrator:latest before launching the expensive Claude agent;
    tests that the container can write, read, and delete a file in /workspace;
    retries up to 3 times with 2-second backoff; aborts the agent launch if
    write access cannot be confirmed, preventing wasted API calls when the
    volume mount has permission issues
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._verify_container_write_access
  metadata:
    created_at: 2026-03-24T08:34:16.442Z
    updated_at: 2026-03-24T08:34:16.442Z
    version: 1
application.applicationfunction.mcp-config-manager:
  id: 202fe78c-29aa-41cd-a746-69845d55f8d3
  path: application.applicationfunction.mcp-config-manager
  spec_node_id: application.applicationfunction
  type: applicationfunction
  layer_id: application
  name: MCP Config Manager
  description: "Manages Model Context Protocol server configuration for agent
    containers (_prepare_mcp_config and _write_mcp_config_file in
    docker_runner.py): translates per-agent MCP server definitions (http or
    stdio type) into a .mcp.json file written to /workspace/.orchestrator/tmp
    (preferred), /app/tmp, or /tmp as fallback; substitutes {work_dir} template
    in stdio args with /workspace (container path); sanitizes task_id colons and
    special characters to prevent Docker mount parsing errors; mounts the file
    read-only at /home/orchestrator/.mcp_config.json inside the agent container;
    cleans up the temp file after container exit"
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._prepare_mcp_config
  metadata:
    created_at: 2026-03-24T08:34:23.751Z
    updated_at: 2026-03-24T08:34:23.751Z
    version: 1
application.applicationfunction.container-recovery-reconnector:
  id: 7f1d2d07-a6c3-4703-a424-1bc475b78029
  path: application.applicationfunction.container-recovery-reconnector
  spec_node_id: application.applicationfunction
  type: applicationfunction
  layer_id: application
  name: Container Recovery Reconnector
  description: "Reconnects to and monitors running agent containers after
    orchestrator restart (reconnect_to_container and
    _monitor_recovered_container in docker_runner.py): spawns a daemon thread
    that runs 'docker wait' with the agent's configured hard timeout; on
    container exit, attempts output retrieval in priority order: 1) Redis key
    agent_result:{project}:{issue}:{task_id}, 2) fallback file
    /tmp/agent_result_{task_id}.json via docker cp, 3) docker logs; parses raw
    stream-json events if the output contains unparsed JSON lines
    (_parse_stream_json_output); delegates to _complete_agent_execution for
    GitHub posting and outcome recording"
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner.reconnect_to_container
  metadata:
    created_at: 2026-03-24T08:34:31.073Z
    updated_at: 2026-03-24T08:34:31.073Z
    version: 1
application.applicationfunction.container-execution-validator:
  id: 4d7c836b-2839-4370-a834-5c9f88d630db
  path: application.applicationfunction.container-execution-validator
  spec_node_id: application.applicationfunction
  type: applicationfunction
  layer_id: application
  name: Container Execution Validator
  description: "Validates agent output after container exit with code 0
    (_validate_result in docker_runner.py): rejects empty output or output
    shorter than 50 characters as a persistence failure (wrapper could not write
    to Redis or file, or Claude crashed); scans first 1KB of output for error
    markers (CRITICAL ERROR, FATAL:, Traceback, redis.exceptions,
    ConnectionRefusedError) that indicate a failure despite a zero exit code; on
    validation failure, persists a failure result to Redis and records the
    outcome before returning empty string to trigger retry"
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._validate_result
  metadata:
    created_at: 2026-03-24T08:34:37.664Z
    updated_at: 2026-03-24T08:34:37.664Z
    version: 1
application.applicationfunction.prompt-file-writer-and-stdin-pipe:
  id: 15425f2f-5cff-4db6-a87c-5968ebcc1f8b
  path: application.applicationfunction.prompt-file-writer-and-stdin-pipe
  spec_node_id: application.applicationfunction
  type: applicationfunction
  layer_id: application
  name: Prompt File Writer and Stdin Pipe
  description: "Prompts are written to .claude_prompt_{safe_task_id}.txt inside
    the mounted project directory; inside the container the shell command is:
    cat /workspace/{filename} | python3 /app/scripts/docker-claude-wrapper.py
    --print --verbose --output-format stream-json --model {model}
    --permission-mode bypassPermissions [-]; this avoids shell command-length
    limits and allows orchestrator to inspect the prompt file after the run"
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._execute_in_container
  metadata:
    created_at: 2026-03-24T09:00:44.059Z
    updated_at: 2026-03-24T09:00:44.059Z
    version: 1
application.applicationfunction.container-image-selection-decision-tree:
