application.applicationfunction.sub-issue-discussion-lookup-via-part-of-pattern:
  id: 09d8e475-89e4-41b4-aa01-d20c0465d77c
  path: application.applicationfunction.sub-issue-discussion-lookup-via-part-of-pattern
  spec_node_id: application.applicationfunction
  type: applicationfunction
  layer_id: application
  name: Sub-Issue Discussion Lookup via Part-Of Pattern
  description: "When a sub-issue needs pipeline context from its parent epic's
    discussion: (1) check issue_discussion_links in github_state.yaml for the
    sub-issue's number; (2) if not found, fetch the issue body via 'gh issue
    view --json body' and parse 'Part of #NNN' with regex; (3) look up the
    parent issue number's discussion in issue_discussion_links; this is the
    cross-workspace context propagation mechanism for the planning-to-execution
    handoff"
  source_reference:
    provenance: extracted
    locations:
      - file: services/project_monitor.py
        symbol: ProjectMonitor.get_previous_stage_context
  metadata:
    created_at: 2026-03-24T09:02:10.757Z
    updated_at: 2026-03-24T09:02:10.757Z
    version: 1
application.applicationfunction.mcp-config-task-id-sanitization:
  id: e8bd6b48-a5b4-4b40-bcd4-d8f6cf981c5b
  path: application.applicationfunction.mcp-config-task-id-sanitization
  spec_node_id: application.applicationfunction
  type: applicationfunction
  layer_id: application
  name: MCP Config Task-ID Sanitization
  description: "Before writing the MCP config file, the task_id is sanitized:
    colons (:) are replaced with underscores because Docker interprets colons as
    volume mount separators causing 'too many colons' errors; additional
    problematic characters (/, \\, space, *, ?, \", <, >, |) are also replaced;
    the config is written to the first writable candidate directory in priority
    order: /workspace/.orchestrator/tmp, /app/tmp, ./tmp, /tmp"
  source_reference:
    provenance: extracted
    locations:
      - file: claude/docker_runner.py
        symbol: DockerAgentRunner._write_mcp_config_file
  metadata:
    created_at: 2026-03-24T09:02:48.056Z
    updated_at: 2026-03-24T09:02:48.056Z
    version: 1
