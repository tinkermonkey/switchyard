application.applicationcomponent.docker-claude-wrapper:
  id: 17c603d5-4fbe-4ae1-9db0-0e1529b617c4
  path: application.applicationcomponent.docker-claude-wrapper
  spec_node_id: application.applicationcomponent
  type: applicationcomponent
  layer_id: application
  name: Docker Claude Wrapper
  description: Container-side Python wrapper script
    (scripts/docker-claude-wrapper.py) that runs inside agent containers;
    streams Claude Code JSON events directly to Redis Stream
    (orchestrator:claude_logs_stream) and pub/sub (orchestrator:claude_stream);
    persists final agent result to Redis key
    agent_result:{project}:{issue}:{task_id} with 2-hour TTL; writes fallback
    result file /tmp/agent_result_{task_id}.json when Redis is unavailable;
    handles SIGTERM/SIGINT for graceful shutdown during orchestrator restarts
  attributes:
    type: internal
  source_reference:
    provenance: extracted
    locations:
      - file: scripts/docker-claude-wrapper.py
        symbol: ClaudeWrapper
  metadata:
    created_at: 2026-03-24T08:33:45.284Z
    updated_at: 2026-03-24T08:33:45.284Z
    version: 1
application.applicationcomponent.claude-code-circuit-breaker:
  id: e2d1d7ac-6688-4b06-802f-af6a02809dfb
  path: application.applicationcomponent.claude-code-circuit-breaker
  spec_node_id: application.applicationcomponent
  type: applicationcomponent
  layer_id: application
  name: Claude Code Circuit Breaker
  description: Token-limit-specific circuit breaker
    (monitoring/claude_code_breaker.py) with CLOSED/OPEN/HALF_OPEN states that
    detects Claude Code session limit messages (e.g. 'hit your limit · resets
    5pm UTC'), trips with a precise reset time, and blocks new agent container
    launches until the limit resets; distinct from the generic CircuitBreaker
    and consulted by DockerAgentRunner before every container launch
  attributes:
    type: internal
  source_reference:
    provenance: extracted
    locations:
      - file: monitoring/claude_code_breaker.py
        symbol: ClaudeCodeBreaker
  metadata:
    created_at: 2026-03-24T08:33:51.433Z
    updated_at: 2026-03-24T08:33:51.433Z
    version: 1
