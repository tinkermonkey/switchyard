  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: services/circuit_breaker.py
            symbol: CircuitBreaker
github-cache-manager:
  id: application.service.github-cache-manager
  name: GitHub Cache Manager
  type: service
  documentation: Redis-backed cache for GitHub API responses with circuit breaker
