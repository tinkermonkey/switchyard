      - technology.language.python-3-11
dev-container-state-manager:
  id: application.service.dev-container-state-manager
  name: Dev Container State Manager
  type: service
  documentation: "Tracks Docker development container image state for projects
    through lifecycle: unverified, in_progress, verified, blocked"
  properties:
