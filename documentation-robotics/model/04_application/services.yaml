pipeline-run-manager:
  id: application.service.pipeline-run-manager
  name: Pipeline Run Manager
  type: service
  documentation: Manages pipeline run lifecycle with dual storage in Redis and
    Elasticsearch, tracking issue journey through workflow pipeline with 7-day
    retention
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: services/pipeline_run.py
            symbol: PipelineRunManager
    crossLayerRelationships:
