github-project-manager:
  id: application.service.github-project-manager
  name: GitHub Project Manager
  type: service
  documentation: Manages GitHub Projects v2 boards with configuration
    reconciliation, ensuring boards match desired state from config files
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: services/github_project_manager.py
            symbol: GitHubProjectManager
    crossLayerRelationships:
      exposes:
        - api.operation.list-projects
      uses:
        - datastore.datastore.yaml-config-store
      manages:
        - data_model.schema.github-state
    uses_technologies:
      - technology.api-client.github-api
      - technology.language.python-3-11
      - technology.data-format.yaml
project-workspace-manager:
  id: application.service.project-workspace-manager
  name: Project Workspace Manager
  type: service
  documentation: Manages project repository checkouts and initialization, handling
    workspace isolation between orchestrator and managed projects
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: services/project_workspace.py
            symbol: ProjectWorkspaceManager
    uses_technologies:
      - technology.platform.docker
      - technology.vcs.git
      - technology.language.python-3-11
feature-branch-manager:
  id: application.service.feature-branch-manager
  name: Feature Branch Manager
  type: service
  documentation: Manages hierarchical branch workflows where parent issues get
    shared feature branches and sub-issues contribute to parent branch with PR
