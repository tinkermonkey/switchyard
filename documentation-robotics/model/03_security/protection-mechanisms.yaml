circuit-breaker-protection:
  id: security.protection-mechanism.circuit-breaker-protection
  name: Circuit Breaker Failure Protection
  type: protection-mechanism
  documentation: Prevents cascading failures by stopping requests to failing
    services with states CLOSED (normal), OPEN (failing), HALF_OPEN (testing
    recovery), using 3 failure threshold and 30s recovery timeout
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: services/circuit_breaker.py
            symbol: CircuitBreaker
    crossLayerRelationships:
      protects:
        - business.capability.pipeline-orchestration
      secures:
        - application.service.circuit-breaker-service
rate-limiting:
  id: security.protection-mechanism.rate-limiting
  name: API Rate Limiting
  type: protection-mechanism
  documentation: Adaptive rate limiting for GitHub API (5000 req/hour) and Claude
    API to prevent quota exhaustion with throttling, exponential backoff, and
    queue management
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: services/circuit_breaker.py
cost-control-circuit-breaker:
  id: security.protection-mechanism.cost-control-circuit-breaker
  name: AI API Cost Control Circuit Breaker
  type: protection-mechanism
  documentation: Prevents runaway costs with max 100 agent calls per repair cycle,
    checkpoint every 5 iterations, protecting against infinite loops and API
    spend
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: pipeline/repair_cycle.py
    crossLayerRelationships:
      protects:
        - business.capability.automated-testing-validation
