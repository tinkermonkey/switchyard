github-app-auth:
  id: security.authentication-scheme.github-app-auth
  name: GitHub App JWT Authentication
  type: authentication-scheme
  documentation: JWT-based authentication for GitHub Apps, providing installation
    tokens for API access with bot identification
  properties:
    auth_type: jwt
    token_lifetime: 1 hour
    issuer: github_app
    source:
      reference:
        provenance: extracted
        locations:
          - file: services/github_app_auth.py
            symbol: GitHubAppAuth
