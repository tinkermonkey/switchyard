docker-socket-access:
  id: security.authorization-policy.docker-socket-access
  name: Docker Socket Access Control
  type: authorization-policy
  documentation: Orchestrator user (UID 1000) granted access to Docker socket for
    Docker-in-Docker agent execution via docker group membership (GID 984)
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: Dockerfile
            symbol: DOCKER_GID
workspace-isolation:
  id: security.authorization-policy.workspace-isolation
  name: Workspace Isolation Authorization
  type: authorization-policy
  documentation: Orchestrator container restricted to /workspace directory,
    preventing access to host filesystem outside isolated workspace boundaries
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: docker-compose.yml
            symbol: volumes
read-only-secrets:
  id: security.authorization-policy.read-only-secrets
  name: Read-Only Secret Mounts
  type: authorization-policy
  documentation: SSH keys and sensitive files mounted read-only to prevent
    modification, protecting SSH private keys and GitHub App credentials
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: docker-compose.yml
            symbol: volumes
