environment-variables:
  id: security.secret-management.environment-variables
  name: Environment Variable Secret Storage
  type: secret-management
  documentation: Secrets passed as environment variables from .env file to
    containers, managing GitHub tokens, API keys, and application credentials
    with container-level isolation
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: .env.example
github-app-private-key:
  id: security.secret-management.github-app-private-key
  name: GitHub App Private Key File Storage
  type: secret-management
  documentation: Private key stored in ~/.orchestrator directory, mounted
    read-only into container for JWT signing with RS256 algorithm
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: services/github_app_auth.py
            symbol: _load_private_key_from_file
ssh-key-mounting:
  id: security.secret-management.ssh-key-mounting
  name: SSH Key Secure Mounting
  type: secret-management
  documentation: Individual SSH key file mounted read-only, preserving container
    SSH config while enabling Git operations
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: docker-compose.yml
            symbol: id_ed25519
