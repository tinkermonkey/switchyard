vite:
  id: technology.build-tool.vite
  name: Vite
  type: build-tool
  documentation: Fast frontend build tool with Hot Module Replacement (HMR) for development
  properties:
    version: ">=7.1.7"
    features:
      - hmr
      - fast_builds
    source:
      reference:
        provenance: extracted
        locations:
          - file: web_ui/package.json
            symbol: vite
makefile:
  id: technology.build-tool.makefile
  name: Make Build System
  type: build-tool
  documentation: Makefile providing build automation, testing shortcuts, and
    deployment commands
  properties:
    provides: build,test,deployment
    source:
      reference:
        provenance: extracted
        locations:
          - file: Makefile
pytest:
  id: technology.build-tool.pytest
  name: Pytest Test Framework
  type: build-tool
  documentation: Python testing framework for unit and integration tests with
    fixtures and coverage
  properties:
    test_types: unit,integration,e2e
    source:
      reference:
        provenance: extracted
        locations:
          - file: pytest.ini
