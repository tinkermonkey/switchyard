  layer_id: data-model
  name: Pipeline Run ID
  description: UUID string identifying a pipeline run; used as tag across all
    observability events, agent logs, and ES documents for cross-document
    correlation
  attributes:
    format: uuid
    pattern: ^[0-9a-f-]{36}$
