software-developers:
  id: motivation.stakeholder.software-developers
  name: Software Developers
  type: stakeholder
  documentation: Primary users who interact with automated agents for coding,
    review, and testing tasks. Developers benefit from reduced manual work,
    faster development cycles, AI-powered assistance with complex problems, and
    clear feedback through GitHub integration. They need the system to be
    reliable, predictable, and provide quality outputs.
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: documentation/vision.md
    motivation:
      benefits-from:
        - motivation.goal.automate-sdlc-lifecycle
        - motivation.goal.reduce-environment-friction
        - motivation.goal.improve-code-quality
engineering-managers:
  id: motivation.stakeholder.engineering-managers
  name: Engineering Managers
  type: stakeholder
  documentation: Leaders who need visibility into team productivity and project
    progress. Managers benefit from real-time project tracking via GitHub
    boards, team capacity planning insights, quality metrics from automated
    reviews, and escalation alerts when human intervention is needed. They
    require clear audit trails and control over autonomous operations.
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: documentation/agent_collaboration_patterns.md
    motivation:
      benefits-from:
        - motivation.goal.maintain-human-oversight
        - motivation.goal.enable-scalable-development
        - motivation.goal.improve-code-quality
architects:
  id: motivation.stakeholder.architects
  name: Software Architects
  type: stakeholder
  documentation: Technical leaders responsible for system design and architectural
    decisions. Architects benefit from design automation, architectural
    consistency enforcement through agents, traceability from requirements to
    implementation, and automated documentation generation. They need the system
    to maintain architectural integrity across features.
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: documentation/vision.md
    motivation:
      benefits-from:
        - motivation.goal.improve-code-quality
        - motivation.goal.automate-sdlc-lifecycle
product-managers:
  id: motivation.stakeholder.product-managers
  name: Product Managers
  type: stakeholder
  documentation: Stakeholders defining product requirements and priorities.
    Product managers benefit from conversational requirements capture, automated
    epic breakdown into implementable stories, delivery visibility through
    GitHub boards, and faster iteration cycles. They need clear communication of
    technical constraints and delivery timelines.
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: documentation/multi_board_system.md
    motivation:
      benefits-from:
        - motivation.goal.accelerate-delivery-cycles
        - motivation.goal.maintain-human-oversight
qa-teams:
  id: motivation.stakeholder.qa-teams
  name: Quality Assurance Teams
  type: stakeholder
  documentation: Teams responsible for ensuring software quality and reliability.
    QA teams benefit from automated testing workflows, comprehensive defect
    detection by review agents, test coverage reports, and quality metrics
    tracking. They need confidence that automated testing maintains the same
    rigor as manual QA processes.
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: documentation/vision.md
    motivation:
      benefits-from:
        - motivation.goal.improve-code-quality
        - motivation.goal.automate-sdlc-lifecycle
