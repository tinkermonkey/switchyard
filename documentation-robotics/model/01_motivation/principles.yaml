maker-checker-pattern:
  id: motivation.principle.maker-checker-pattern
  name: Maker-Checker Quality Pattern
  type: principle
  documentation: Every artifact created by a maker agent must be reviewed by a
    checker agent before progression, ensuring quality gates at each stage. This
    pattern enables compound quality improvements over time by catching defects
    early and reducing rework. Prioritizes correctness over speed.
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: documentation/agent_collaboration_patterns.md
    business:
      guides:
        - business.capability.continuous-code-review
isolated-context-windows:
  id: motivation.principle.isolated-context-windows
  name: Isolated Agent Context Windows
  type: principle
  documentation: Each agent operates in isolated 200K token context windows to
    prevent context pollution and enable parallel processing. Context isolation
    is crucial for managing complex multi-hour development sessions where
    different aspects of the codebase require focused attention without
    information overload.
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: documentation/vision.md
    business:
      guides:
        - business.capability.ai-powered-development
sequential-pipeline-orchestration:
  id: motivation.principle.sequential-pipeline-orchestration
  name: Sequential Pipeline Orchestration
  type: principle
  documentation: Agents process outputs in predefined order with defined handoff
    points, enabling progressive refinement and clear dependencies. This
    deterministic flow control provides quality-focused processing while
    maintaining visibility into workflow progression through each SDLC stage.
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: documentation/vision.md
    business:
      guides:
        - business.capability.pipeline-orchestration
stateful-recovery:
  id: motivation.principle.stateful-recovery
  name: Stateful Checkpoint Recovery
  type: principle
  documentation: System preserves state at major phase completions with both
    backward recovery to stable checkpoints and forward recovery through error
    correction. Checkpoint-based persistence minimizes lost work during failures
    and enables robust long-running autonomous sessions spanning multiple hours.
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: documentation/vision.md
    business:
      guides:
        - business.capability.pipeline-orchestration
github-as-source-of-truth:
  id: motivation.principle.github-as-source-of-truth
  name: GitHub as Single Source of Truth
  type: principle
  documentation: All work items, progress, and decisions are tracked in GitHub
    Projects v2 boards, providing visibility and audit trails. GitHub
    integration enables human oversight, familiar tooling for teams, and
    enterprise compliance requirements through comprehensive activity tracking.
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: documentation/agent_collaboration_patterns.md
    business:
      guides:
        - business.capability.github-project-management
docker-isolation:
  id: motivation.principle.docker-isolation
  name: Docker Container Isolation
  type: principle
  documentation: Each agent runs in isolated Docker containers with
    project-specific dependencies, preventing environmental conflicts.
    Docker-in-Docker architecture provides reproducible builds, strong security
    boundaries, and enables the system to work with any technology stack without
    host environment pollution.
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: documentation/vision.md
    business:
      guides:
        - business.capability.development-environment-automation
configuration-driven-adaptability:
  id: motivation.principle.configuration-driven-adaptability
  name: Configuration-Driven Tech Stack Adaptability
  type: principle
  documentation: Agents adapt to different technology stacks through YAML
    configuration rather than hard-coding, enabling universal applicability.
    Configuration specifies language, framework, testing tools, and deployment
    targets allowing the same agent system to work with Python, Java,
    JavaScript, or any other tech stack.
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: documentation/vision.md
    business:
      guides:
        - business.capability.development-environment-automation
        - business.capability.ai-powered-development
conversational-refinement:
  id: motivation.principle.conversational-refinement
  name: Conversational Iterative Refinement
  type: principle
  documentation: Support multi-turn conversations with 1-hour feedback windows for
    requirements, designs, and specifications. This conversational approach
    captures nuanced requirements, enables human collaboration with agents, and
    reduces misunderstandings through interactive clarification.
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: .claude/CLAUDE.md
    business:
      guides:
        - business.capability.conversational-requirements-gathering
