observability-manager:
  id: apm.monitor.observability-manager
  name: Real-Time Agent Observability Monitor
  type: monitor
  documentation: Dual Redis pub/sub and Elasticsearch event streaming for 85+
    agent lifecycle events with 30-day retention, supports real-time monitoring
    and historical analytics
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: monitoring/observability.py
            symbol: ObservabilityManager
    crossLayerRelationships:
      monitors:
        - application.service.worker-pool-manager
        - application.service.pipeline-run-manager
      uses:
        - datastore.datastore.redis
        - datastore.datastore.elasticsearch
      aligned-with:
        - application.service.observability-manager
