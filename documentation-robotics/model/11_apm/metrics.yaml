github-rate-limit-tracker:
  id: apm.metric.github-rate-limit-tracker
  name: GitHub API Rate Limit Tracker
  type: metric
  documentation: Centralized GitHub API rate limit tracking with adaptive
    throttling (at 80%, 90%, 95% usage), exponential backoff, automatic alarm
    generation, and 5-minute periodic refresh with call stack tracing for
    debugging
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: services/github_api_client.py
            symbol: GitHubAPIClient
circuit-breaker-monitor:
  id: apm.metric.circuit-breaker-monitor
  name: GitHub Circuit Breaker Monitor
  type: metric
  documentation: Circuit breaker for GitHub API with three states (CLOSED, OPEN,
    HALF_OPEN), automatic trip on rate limit exhaustion, Redis state
    persistence, and automatic recovery testing at reset time
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: services/github_api_client.py
            symbol: GitHubBreaker
task-execution-metrics:
  id: apm.metric.task-execution-metrics
  name: Task Execution Performance Metrics
  type: metric
  documentation: Per-task execution metrics tracking agent performance with
    duration, success/failure, timestamp, and agent identity for trend analysis
    and SLO monitoring stored in orchestrator-task-metrics-* indices
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: monitoring/metrics.py
            symbol: MetricsCollector.record_task_complete
quality-metrics:
  id: apm.metric.quality-metrics
  name: Agent Quality Score Metrics
  type: metric
  documentation: Agent-specific quality metrics with metric_name and score for
    tracking review acceptance rates, iteration counts, escalation rates, and
    other quality indicators stored in orchestrator-quality-metrics-* indices
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: monitoring/metrics.py
            symbol: MetricsCollector.record_quality_metric
