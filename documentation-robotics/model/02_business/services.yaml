project-lifecycle-management:
  id: business.service.project-lifecycle-management
  name: Project Lifecycle Management Service
  type: service
  documentation: End-to-end project management from onboarding through active development
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: services/project_manager.py
    motivation:
      supports-goals:
        - motivation.goal.automate-sdlc
        - motivation.goal.enable-scalability
      governed-by-principles:
