planning-design-pipeline:
  id: business.service.planning-design-pipeline
  name: Planning & Design Pipeline Service
  type: service
  documentation: Pre-SDLC planning service orchestrating research, requirements,
    architecture design, and work breakdown
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: config/foundations/pipelines.yaml
            symbol: planning_design
    motivation:
      supports-goals:
        - motivation.goal.improve-code-quality
        - motivation.goal.automate-sdlc
      governed-by-principles:
        - motivation.principle.conversational-refinement
        - motivation.principle.sequential-pipeline
    application:
      realized-by:
        - application.service.pipeline-run-manager
        - application.service.conversational-session-state-manager
    supportsGoals:
      - motivation.goal.accelerate-development
      - motivation.goal.improve-software-quality
sdlc-execution-pipeline:
  id: business.service.sdlc-execution-pipeline
  name: SDLC Execution Pipeline Service
  type: service
  documentation: Core development service orchestrating implementation, code
    review, testing, and staging
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: config/foundations/pipelines.yaml
            symbol: sdlc_execution
    motivation:
      supports-goals:
        - motivation.goal.automate-sdlc
        - motivation.goal.improve-code-quality
        - motivation.goal.accelerate-delivery
      governed-by-principles:
        - motivation.principle.maker-checker-pattern
        - motivation.principle.sequential-pipeline
        - motivation.principle.stateful-checkpoint-recovery
      satisfies-requirements:
        - motivation.requirement.quality-gates
        - motivation.requirement.fault-tolerance-recovery
    application:
      realized-by:
        - application.service.pipeline-run-manager
        - application.service.worker-pool-manager
        - application.component.code-reviewer-agent
        - application.component.senior-software-engineer-agent
