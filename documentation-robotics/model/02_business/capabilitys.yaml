  name: Autonomous SDLC Automation
  type: capability
  documentation: End-to-end automation of software development lifecycle from
    requirements gathering through deployment, coordinated through GitHub
    Projects v2 boards
  properties:
    source:
      reference:
        provenance: extracted
        locations:
