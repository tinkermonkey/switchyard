redis:
  id: data-store.datastore.redis
  name: Redis In-Memory Store
  type: datastore
  documentation: In-memory key-value store for task queue, pipeline locks, active
    runs, circuit breaker state, and caching
  properties:
    crossLayerRelationships:
      stores:
        - data_model.schema.task-info
        - data_model.schema.pipeline-checkpoint
        - data_model.schema.pipeline-run
elasticsearch:
  id: data-store.datastore.elasticsearch
  name: Elasticsearch Search Engine
  type: datastore
  documentation: Search and analytics engine for metrics, logs, events, pattern
    detection, and decision event storage with ILM policies
  properties:
    crossLayerRelationships:
      stores:
        - data_model.schema.task-metrics
        - data_model.schema.pipeline-run
yaml-config-store:
  id: data-store.datastore.yaml-config-store
  name: YAML Configuration Store
  type: datastore
  documentation: File-based configuration store for foundation configs, project
    configs, and runtime state persistence
  properties:
    crossLayerRelationships:
      stores:
        - data_model.schema.project-config
        - data_model.schema.agent-config
        - data_model.schema.github-state
json-metrics-backup:
  id: data-store.datastore.json-metrics-backup
  name: JSON Metrics Backup
  type: datastore
  documentation: JSONL file-based backup storage for metrics fallback when
    Elasticsearch is unavailable
redis-orchestrator-event-stream:
  id: data-store.datastore.redis-orchestrator-event-stream
  name: Redis Orchestrator Event Stream
  type: datastore
  documentation: Redis stream for real-time observability events, pipeline
    execution tracking, and agent lifecycle monitoring
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: services/observability.py
redis-task-queues:
  id: data-store.datastore.redis-task-queues
  name: Redis Task Queues
  type: datastore
  documentation: Priority-based task queues using Redis lists for high, medium,
    and low priority task scheduling
  properties:
    source:
      reference:
        provenance: extracted
        locations:
          - file: task_queue/task_manager.py
redis-task-metadata:
  id: data-store.datastore.redis-task-metadata
  name: Redis Task Metadata
  type: datastore
  documentation: Individual task state and metadata storage using Redis hashes for
