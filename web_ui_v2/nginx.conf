server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy WebSocket and API requests to observability server
    location /socket.io {
        proxy_pass http://observability-server:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /history {
        proxy_pass http://observability-server:5001/history;
        proxy_set_header Host $host;
    }

    location /claude-logs-history {
        proxy_pass http://observability-server:5001/claude-logs-history;
        proxy_set_header Host $host;
    }

    location /current-pipeline {
        proxy_pass http://observability-server:5001/current-pipeline;
        proxy_set_header Host $host;
    }
}
