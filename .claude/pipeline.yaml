pipeline:
  name: "SDLC Automation"
  stages:
    - name: "requirements_analysis"
      agent: "business_analyst"
      circuit_breaker:
        failure_threshold: 3
        timeout_seconds: 300
      quality_gate:
        completeness: 0.9
        clarity: 0.85
    
    - name: "requirements_review"
      agent: "requirements_reviewer"
      circuit_breaker:
        failure_threshold: 2
        timeout_seconds: 180
      quality_gate:
        accuracy: 0.95
        coverage: 0.9

  handoff_validation:
    enforce_quality_gates: true
    allow_manual_override: true
    
  state_management:
    checkpoint_frequency: "every_stage"
    retention_days: 30
    git_versioning: true