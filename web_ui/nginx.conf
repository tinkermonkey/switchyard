# Updated 2025-10-06 to add /api/ proxy and reduce logging verbosity
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Disable access logs for polling endpoints to reduce verbosity
    # Only log errors
    access_log off;
    error_log /var/log/nginx/error.log warn;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Proxy all API requests to observability server
    location ~ ^/(socket\.io|history|claude-logs-history|current-pipeline|active-pipeline-runs|completed-pipeline-runs|pipeline-run-events|pipeline-runs|api|health|agents|projects|git|devcontainer|workspace|pipelines)/ {
        proxy_pass http://observability-server:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /socket.io {
        proxy_pass http://observability-server:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /history {
        proxy_pass http://observability-server:5001/history;
        proxy_set_header Host $host;
    }

    location /claude-logs-history {
        proxy_pass http://observability-server:5001/claude-logs-history;
        proxy_set_header Host $host;
    }

    location /current-pipeline {
        proxy_pass http://observability-server:5001/current-pipeline;
        proxy_set_header Host $host;
    }

    location /active-pipeline-runs {
        proxy_pass http://observability-server:5001/active-pipeline-runs;
        proxy_set_header Host $host;
    }

    location /completed-pipeline-runs {
        proxy_pass http://observability-server:5001/completed-pipeline-runs;
        proxy_set_header Host $host;
    }

    location /pipeline-run-events {
        proxy_pass http://observability-server:5001/pipeline-run-events;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://observability-server:5001/api/;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://observability-server:5001/health;
        proxy_set_header Host $host;
    }

    location /agents/ {
        proxy_pass http://observability-server:5001/agents/;
        proxy_set_header Host $host;
    }

    # Serve static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback - serve index.html for all non-API routes
    # This allows client-side routing (React Router) to work on page refresh
    location / {
        try_files $uri $uri/ /index.html;
    }
}
