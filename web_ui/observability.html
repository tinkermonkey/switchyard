<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Observability Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }

        .header {
            background: #161b22;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #30363d;
        }

        .header h1 {
            color: #58a6ff;
            margin-bottom: 10px;
        }

        .connection-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .connection-status.connected {
            background: #238636;
            color: white;
        }

        .connection-status.disconnected {
            background: #da3633;
            color: white;
        }

        .controls {
            margin-bottom: 20px;
        }

        button {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }

        button:hover {
            background: #30363d;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #161b22;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #30363d;
        }

        .stat-card h3 {
            color: #8b949e;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-card .value {
            color: #58a6ff;
            font-size: 24px;
            font-weight: 600;
        }

        .events-container {
            /*background: #161b22;*/
            border-radius: 6px;
            /*border: 1px solid #30363d;*/
            min-height: 200px;
        }

        .event {
            padding: 15px;
            border-bottom: 1px solid #21262d;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
        }

        .event:last-child {
            border-bottom: none;
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .event-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .event-type.lifecycle { background: #1f6feb; }
        .event-type.prompt { background: #8957e5; }
        .event-type.claude { background: #da7633; }
        .event-type.response { background: #238636; }
        .event-type.tool { background: #9e6a03; }
        .event-type.performance { background: #6e7681; }

        .event-template {
            background: #161b22;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #30363d;
        }

        .event-template-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #21262d;
        }

        .event-icon {
            font-size: 20px;
        }

        .event-title {
            flex: 1;
            font-weight: 600;
            color: #c9d1d9;
        }

        .event-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .event-badge.success { background: #238636; color: white; }
        .event-badge.info { background: #1f6feb; color: white; }
        .event-badge.warning { background: #9e6a03; color: white; }
        .event-badge.error { background: #da3633; color: white; }

        .event-details {
            display: grid;
            gap: 8px;
        }

        .event-detail-row {
            display: flex;
            gap: 10px;
            font-size: 13px;
        }

        .event-detail-label {
            color: #8b949e;
            min-width: 120px;
        }

        .event-detail-value {
            color: #c9d1d9;
            flex: 1;
        }

        .event-metric {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: #0d1117;
            border-radius: 4px;
            font-size: 12px;
        }

        .event-metric-label {
            color: #8b949e;
        }

        .event-metric-value {
            color: #58a6ff;
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #21262d;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #1f6feb, #58a6ff);
            transition: width 0.3s ease;
        }

        .expandable-section {
            margin-top: 10px;
            cursor: pointer;
            color: #58a6ff;
            font-size: 12px;
        }

        .expandable-section:hover {
            text-decoration: underline;
        }

        .expandable-content {
            display: none;
            margin-top: 10px;
            padding: 10px;
            background: #0d1117;
            border-radius: 4px;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .expandable-content.expanded {
            display: block;
        }

        .event-timestamp {
            color: #8b949e;
            font-size: 11px;
        }

        .event-agent {
            color: #58a6ff;
            font-weight: 600;
        }

        .event-data {
            background: #0d1117;
            padding: 10px;
            border-radius: 3px;
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        .event-data pre {
            color: #c9d1d9;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .prompt-preview {
            color: #8b949e;
            font-style: italic;
            max-height: 100px;
            overflow-y: auto;
            margin-top: 5px;
        }

        .live-logs-container {
            background: #161b22;
            border-radius: 6px;
            border: 1px solid #30363d;
            margin-bottom: 20px;
        }

        .live-logs-header {
            padding: 15px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .live-logs-header h2 {
            color: #58a6ff;
            font-size: 16px;
            margin: 0;
        }

        .live-logs-content {
            min-height: 200px;
            max-height: 30vh;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 12px;
        }

        .log-entry {
            padding: 8px 15px;
            border-bottom: 1px solid #21262d;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .log-entry:hover {
            background: #1c2128;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-timestamp {
            color: #6e7681;
            white-space: nowrap;
        }

        .log-type {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .log-type.tool { background: #9e6a03; }
        .log-type.text { background: #238636; }
        .log-type.usage { background: #6e7681; }
        .log-type.error { background: #da3633; }
        .log-type.result { background: #1f6feb; }

        .log-content {
            flex: 1;
            color: #c9d1d9;
            word-wrap: break-word;
        }

        .log-info-icon {
            color: #58a6ff;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 3px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .log-info-icon:hover {
            opacity: 1;
            background: #30363d;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            max-width: 90%;
            max-height: 90%;
            overflow: auto;
            padding: 20px;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #30363d;
        }

        .modal-header h3 {
            color: #58a6ff;
            margin: 0;
        }

        .modal-close {
            background: transparent;
            color: #8b949e;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 3px;
        }

        .modal-close:hover {
            background: #30363d;
            color: #c9d1d9;
        }

        .modal-body {
            color: #c9d1d9;
        }

        .json-viewer {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 3px;
            padding: 15px;
            overflow: auto;
            max-height: 600px;
        }

        .json-viewer pre {
            margin: 0;
            color: #c9d1d9;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .log-content code {
            background: #0d1117;
            padding: 2px 4px;
            border-radius: 3px;
            color: #79c0ff;
        }

        .log-content p {
            margin: 4px 0;
        }

        .log-content ul,
        .log-content ol {
            margin: 4px 0;
            padding-left: 20px;
        }

        .log-content li {
            margin: 2px 0;
        }

        .log-content h1,
        .log-content h2,
        .log-content h3,
        .log-content h4,
        .log-content h5,
        .log-content h6 {
            color: #58a6ff;
            margin: 6px 0 4px 0;
            font-weight: 600;
        }

        .log-content pre {
            background: #0d1117;
            padding: 8px;
            border-radius: 3px;
            overflow-x: auto;
            margin: 4px 0;
        }

        .log-content blockquote {
            border-left: 3px solid #30363d;
            padding-left: 10px;
            margin: 4px 0;
            color: #8b949e;
        }

        .log-content a {
            color: #58a6ff;
            text-decoration: none;
        }

        .log-content a:hover {
            text-decoration: underline;
        }

        .todo-list {
            margin: 4px 0;
        }

        .todo-item {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            margin: 2px 0;
        }

        .todo-checkbox {
            margin-top: 2px;
            font-size: 14px;
        }

        .todo-checkbox.completed {
            color: #238636;
        }

        .todo-checkbox.pending {
            color: #8b949e;
        }

        .todo-text {
            flex: 1;
        }

        .todo-text.completed {
            color: #8b949e;
            text-decoration: line-through;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Agent Observability Dashboard</h1>
        <span class="connection-status disconnected" id="connectionStatus">Disconnected</span>
    </div>

    <div class="controls">
        <button onclick="clearEvents()">Clear Events</button>
        <button onclick="toggleAutoScroll()">Auto-scroll: <span id="autoScrollStatus">ON</span></button>
    </div>

    <div class="stats">
        <div class="stat-card">
            <h3>Total Events</h3>
            <div class="value" id="totalEvents">0</div>
        </div>
        <div class="stat-card">
            <h3>Active Tasks</h3>
            <div class="value" id="activeTasks">0</div>
        </div>
        <div class="stat-card">
            <h3>Total Tokens</h3>
            <div class="value" id="totalTokens">0</div>
        </div>
        <div class="stat-card">
            <h3>Avg API Latency</h3>
            <div class="value" id="avgLatency">0ms</div>
        </div>
    </div>

    <div class="live-logs-container">
        <div class="live-logs-header">
            <h2>Claude Live Logs</h2>
            <button onclick="clearLiveLogs()">Clear Logs</button>
        </div>
        <div class="live-logs-content" id="liveLogsContent">
            <div style="padding: 15px; color: #8b949e; text-align: center;">
                Waiting for Claude activity...
            </div>
        </div>
    </div>

    <div class="events-container" id="eventsContainer">
        <!-- Events will be added here -->
    </div>

    <script>
        const socket = io('http://localhost:5001');
        let autoScroll = true;
        let eventCount = 0;
        let activeTasks = new Set();
        let totalTokens = 0;
        let apiLatencies = [];

        socket.on('connect', () => {
            document.getElementById('connectionStatus').textContent = 'Connected';
            document.getElementById('connectionStatus').className = 'connection-status connected';

            // Load recent history
            loadHistory();
            loadClaudeLogsHistory();
        });

        socket.on('disconnect', () => {
            document.getElementById('connectionStatus').textContent = 'Disconnected';
            document.getElementById('connectionStatus').className = 'connection-status disconnected';
        });

        socket.on('agent_event', (event) => {
            addEvent(event);
            updateStats(event);
        });

        socket.on('claude_stream_event', (data) => {
            addLiveLog(data);
        });

        function addEvent(event) {
            eventCount++;
            document.getElementById('totalEvents').textContent = eventCount;

            const container = document.getElementById('eventsContainer');
            const timestamp = new Date(event.timestamp).toLocaleTimeString();

            // Use specialized template based on event type
            let eventHtml = '';
            switch(event.event_type) {
                case 'task_received':
                    eventHtml = renderTaskReceived(event, timestamp);
                    break;
                case 'agent_initialized':
                    eventHtml = renderAgentInitialized(event, timestamp);
                    break;
                case 'prompt_constructed':
                    eventHtml = renderPromptConstructed(event, timestamp);
                    break;
                case 'claude_api_call_started':
                    eventHtml = renderClaudeCallStarted(event, timestamp);
                    break;
                case 'claude_api_call_completed':
                    eventHtml = renderClaudeCallCompleted(event, timestamp);
                    break;
                case 'agent_completed':
                case 'agent_failed':
                    eventHtml = renderAgentCompleted(event, timestamp);
                    break;
                default:
                    eventHtml = renderGenericEvent(event, timestamp);
            }

            // Create temporary container to parse HTML
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = eventHtml;

            // Get the actual element (skip text nodes)
            const eventElement = tempDiv.querySelector('.event-template, .event');

            if (eventElement) {
                container.insertBefore(eventElement, container.firstChild);
            } else {
                console.error('Failed to create event element:', eventHtml.substring(0, 100));
            }

            if (autoScroll && container.children.length > 1) {
                container.scrollTop = 0;
            }

            // Keep only last 50 events in DOM
            while (container.children.length > 50) {
                container.removeChild(container.lastChild);
            }
        }

        // Template rendering functions
        function renderTaskReceived(event, timestamp) {
            return `
                <div class="event-template">
                    <div class="event-template-header">
                        <span class="event-icon">📥</span>
                        <div class="event-title">Task Received</div>
                        <span class="event-badge info">${event.agent}</span>
                        <span class="event-timestamp">${timestamp}</span>
                    </div>
                    <div class="event-details">
                        <div class="event-detail-row">
                            <span class="event-detail-label">Project</span>
                            <span class="event-detail-value">${event.project}</span>
                        </div>
                        <div class="event-detail-row">
                            <span class="event-detail-label">Board</span>
                            <span class="event-detail-value">${event.data.board || 'N/A'}</span>
                        </div>
                        <div class="event-detail-row">
                            <span class="event-detail-label">Issue</span>
                            <span class="event-detail-value">#${event.data.issue_number || 'N/A'}</span>
                        </div>
                        <div class="event-detail-row">
                            <span class="event-detail-label">Trigger</span>
                            <span class="event-detail-value">${event.data.trigger || 'manual'}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAgentInitialized(event, timestamp) {
            const mcpCount = event.data.mcp_servers ? event.data.mcp_servers.length : 0;
            return `
                <div class="event-template">
                    <div class="event-template-header">
                        <span class="event-icon">⚙️</span>
                        <div class="event-title">Agent Initialized</div>
                        <span class="event-badge info">${event.agent}</span>
                        <span class="event-timestamp">${timestamp}</span>
                    </div>
                    <div class="event-details">
                        <div class="event-detail-row">
                            <span class="event-detail-label">Model</span>
                            <span class="event-detail-value">${event.data.model || 'default'}</span>
                        </div>
                        <div class="event-detail-row">
                            <span class="event-detail-label">Timeout</span>
                            <span class="event-detail-value">${event.data.timeout || 'default'}s</span>
                        </div>
                        <div class="event-detail-row">
                            <span class="event-detail-label">MCP Servers</span>
                            <span class="event-detail-value">${mcpCount} configured</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPromptConstructed(event, timestamp) {
            const tokens = event.data.estimated_tokens || Math.floor(event.data.prompt_length / 4);
            const promptId = 'prompt_' + Date.now();
            return `
                <div class="event-template">
                    <div class="event-template-header">
                        <span class="event-icon">📝</span>
                        <div class="event-title">Prompt Constructed</div>
                        <span class="event-badge info">${event.agent}</span>
                        <span class="event-timestamp">${timestamp}</span>
                    </div>
                    <div class="event-details">
                        <div style="display: flex; gap: 10px;">
                            <div class="event-metric">
                                <span class="event-metric-label">Length</span>
                                <span class="event-metric-value">${event.data.prompt_length.toLocaleString()}</span>
                            </div>
                            <div class="event-metric">
                                <span class="event-metric-label">Est. Tokens</span>
                                <span class="event-metric-value">~${tokens.toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="expandable-section" onclick="toggleExpand('${promptId}')">
                            ▶ View prompt preview
                        </div>
                        <div id="${promptId}" class="expandable-content">
                            <pre>${escapeHtml(event.data.prompt_preview || event.data.prompt || '')}</pre>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderClaudeCallStarted(event, timestamp) {
            const model = event.data?.model || 'claude';
            return `
                <div class="event-template">
                    <div class="event-template-header">
                        <span class="event-icon">🚀</span>
                        <div class="event-title">Claude API Call Started</div>
                        <span class="event-badge warning">${model}</span>
                        <span class="event-timestamp">${timestamp}</span>
                    </div>
                    <div class="event-details">
                        <div class="event-detail-row">
                            <span class="event-detail-label">Agent</span>
                            <span class="event-detail-value">${event.agent}</span>
                        </div>
                        ${event.data?.input_tokens ? `
                        <div class="event-metric">
                            <span class="event-metric-label">Input Tokens</span>
                            <span class="event-metric-value">${event.data.input_tokens.toLocaleString()}</span>
                        </div>
                        ` : ''}
                    </div>
                    <div class="progress-bar">
                        <div class="progress-bar-fill" style="width: 100%; animation: pulse 1.5s ease-in-out infinite;"></div>
                    </div>
                </div>
            `;
        }

        function renderClaudeCallCompleted(event, timestamp) {
            const duration = ((event.data?.duration_ms || 0) / 1000).toFixed(2);
            const inputTokens = event.data?.input_tokens || 0;
            const outputTokens = event.data?.output_tokens || 0;
            const totalTokens = event.data?.total_tokens || (inputTokens + outputTokens);
            const costEstimate = ((inputTokens * 0.003 + outputTokens * 0.015) / 1000).toFixed(4);
            return `
                <div class="event-template">
                    <div class="event-template-header">
                        <span class="event-icon">✅</span>
                        <div class="event-title">Claude API Call Completed</div>
                        <span class="event-badge success">${duration}s</span>
                        <span class="event-timestamp">${timestamp}</span>
                    </div>
                    <div class="event-details">
                        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <div class="event-metric">
                                <span class="event-metric-label">Input</span>
                                <span class="event-metric-value">${inputTokens.toLocaleString()}</span>
                            </div>
                            <div class="event-metric">
                                <span class="event-metric-label">Output</span>
                                <span class="event-metric-value">${outputTokens.toLocaleString()}</span>
                            </div>
                            <div class="event-metric">
                                <span class="event-metric-label">Total</span>
                                <span class="event-metric-value">${totalTokens.toLocaleString()}</span>
                            </div>
                            <div class="event-metric">
                                <span class="event-metric-label">Est. Cost</span>
                                <span class="event-metric-value">$${costEstimate}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAgentCompleted(event, timestamp) {
            const isSuccess = event.event_type === 'agent_completed';
            const duration = event.data?.duration_seconds ? (event.data.duration_seconds / 60).toFixed(1) : 'N/A';
            return `
                <div class="event-template">
                    <div class="event-template-header">
                        <span class="event-icon">${isSuccess ? '🎉' : '❌'}</span>
                        <div class="event-title">${isSuccess ? 'Agent Completed' : 'Agent Failed'}</div>
                        <span class="event-badge ${isSuccess ? 'success' : 'error'}">${event.agent}</span>
                        <span class="event-timestamp">${timestamp}</span>
                    </div>
                    <div class="event-details">
                        <div class="event-detail-row">
                            <span class="event-detail-label">Duration</span>
                            <span class="event-detail-value">${duration} minutes</span>
                        </div>
                        <div class="event-detail-row">
                            <span class="event-detail-label">Status</span>
                            <span class="event-detail-value">${isSuccess ? '✓ Success' : '✗ Failed'}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderGenericEvent(event, timestamp) {
            const eventCategory = getEventCategory(event.event_type);
            const eventId = 'event_' + Date.now();
            return `
                <div class="event">
                    <div class="event-header">
                        <div>
                            <span class="event-type ${eventCategory}">${event.event_type}</span>
                            <span class="event-agent">${event.agent}</span>
                            <span style="color: #8b949e;">/ ${event.project}</span>
                        </div>
                        <span class="event-timestamp">${timestamp}</span>
                    </div>
                    <div style="font-size: 11px; color: #8b949e;">Task: ${event.task_id}</div>
                    <div class="expandable-section" onclick="toggleExpand('${eventId}')">
                        ▶ View details
                    </div>
                    <div id="${eventId}" class="expandable-content">
                        <pre>${JSON.stringify(event.data, null, 2)}</pre>
                    </div>
                </div>
            `;
        }

        function toggleExpand(id) {
            const element = document.getElementById(id);
            if (element) {
                element.classList.toggle('expanded');
                const section = element.previousElementSibling;
                if (section && section.classList.contains('expandable-section')) {
                    section.textContent = element.classList.contains('expanded') ? '▼ Hide details' : '▶ View details';
                }
            }
        }

        function getEventCategory(eventType) {
            if (eventType.includes('task') || eventType.includes('agent_initialized') || eventType.includes('agent_completed') || eventType.includes('agent_failed')) {
                return 'lifecycle';
            } else if (eventType.includes('prompt')) {
                return 'prompt';
            } else if (eventType.includes('claude')) {
                return 'claude';
            } else if (eventType.includes('response')) {
                return 'response';
            } else if (eventType.includes('tool')) {
                return 'tool';
            } else {
                return 'performance';
            }
        }

        function updateStats(event) {
            // Track active tasks
            if (event.event_type === 'task_received') {
                activeTasks.add(event.task_id);
            } else if (event.event_type === 'agent_completed' || event.event_type === 'agent_failed') {
                activeTasks.delete(event.task_id);
            }
            document.getElementById('activeTasks').textContent = activeTasks.size;

            // Track token usage
            if (event.event_type === 'claude_api_call_completed') {
                const tokens = event.data.total_tokens || 0;
                totalTokens += tokens;
                document.getElementById('totalTokens').textContent = totalTokens.toLocaleString();

                // Track latency
                apiLatencies.push(event.data.duration_ms);
                if (apiLatencies.length > 10) apiLatencies.shift();
                const avgLatency = apiLatencies.reduce((a, b) => a + b, 0) / apiLatencies.length;
                document.getElementById('avgLatency').textContent = Math.round(avgLatency) + 'ms';
            }
        }

        function clearEvents() {
            document.getElementById('eventsContainer').innerHTML = '';
            eventCount = 0;
            document.getElementById('totalEvents').textContent = '0';
        }

        function toggleAutoScroll() {
            autoScroll = !autoScroll;
            document.getElementById('autoScrollStatus').textContent = autoScroll ? 'ON' : 'OFF';
        }

        function formatToolUse(item) {
            const toolName = item.name;
            const input = item.input || {};

            switch(toolName) {
                case 'Bash':
                    return `Bash: ${input.command || ''}`;

                case 'Read':
                    const readPath = input.file_path || '';
                    const offset = input.offset;
                    const limit = input.limit;
                    let readCmd = `Read: ${readPath}`;
                    if (offset !== undefined || limit !== undefined) {
                        readCmd += ` (lines ${offset || 1}-${offset ? offset + (limit || 'end') : (limit || 'end')})`;
                    }
                    return readCmd;

                case 'Grep':
                    const pattern = input.pattern || '';
                    const grepPath = input.path || '.';
                    const outputMode = input.output_mode || 'files_with_matches';
                    let flags = [];
                    if (input['-i']) flags.push('-i');
                    if (input['-n']) flags.push('-n');
                    if (input.glob) flags.push(`--glob="${input.glob}"`);
                    const flagStr = flags.length > 0 ? ' ' + flags.join(' ') : '';
                    return `Grep${flagStr}: "${pattern}" in ${grepPath}`;

                case 'Edit':
                    return `Edit: ${input.file_path || ''}`;

                case 'Write':
                    return `Write: ${input.file_path || ''}`;

                case 'Glob':
                    const globPattern = input.pattern || '';
                    const globPath = input.path || '.';
                    return `Glob: ${globPattern} in ${globPath}`;

                case 'WebFetch':
                    const url = input.url || '';
                    return `WebFetch: ${url}`;

                case 'WebSearch':
                    const query = input.query || '';
                    return `WebSearch: "${query}"`;

                case 'Task':
                    const taskDesc = input.description || '';
                    return `Task: ${taskDesc}`;

                case 'TodoWrite':
                    const todos = input.todos || [];
                    if (todos.length === 0) return 'TodoWrite: No todos';
                    return `TodoWrite: ${todos.length} item${todos.length !== 1 ? 's' : ''}`;

                default:
                    // Generic tool display with description if available
                    const desc = input.description || '';
                    return `${toolName}${desc ? ': ' + desc : ''}`;
            }
        }

        function renderTodoList(todos) {
            if (!todos || todos.length === 0) return '';

            let html = '<div class="todo-list">';
            for (const todo of todos) {
                const status = todo.status || 'pending';
                const isCompleted = status === 'completed';
                const checkbox = isCompleted ? '☑' : '☐';
                const content = todo.content || '';

                html += `
                    <div class="todo-item">
                        <span class="todo-checkbox ${isCompleted ? 'completed' : 'pending'}">${checkbox}</span>
                        <span class="todo-text ${isCompleted ? 'completed' : ''}">${escapeHtml(content)}</span>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        }

        function addLiveLog(data) {
            const container = document.getElementById('liveLogsContent');

            // Clear the "waiting" message if present
            if (container.querySelector('[style*="text-align: center"]')) {
                container.innerHTML = '';
            }

            const event = data.event;
            const timestamp = new Date().toLocaleTimeString();

            let logType = 'text';
            let logContent = '';
            let toolData = null;

            // Parse different types of stream events
            if (event.type === 'assistant') {
                // Parse assistant messages (text, tool use, etc.)
                const msg = event.message;
                if (msg && msg.content) {
                    // Assistant message with content array
                    const contents = Array.isArray(msg.content) ? msg.content : [msg.content];

                    for (const item of contents) {
                        if (item.type === 'text') {
                            logType = 'text';
                            logContent = item.text || '';
                            break;
                        } else if (item.type === 'tool_use') {
                            logType = 'tool';
                            logContent = formatToolUse(item);
                            // Store full tool data for TodoWrite rendering
                            if (item.name === 'TodoWrite') {
                                toolData = item;
                            }
                            break;
                        }
                    }

                    // If no content extracted, show usage info
                    if (!logContent && msg.usage) {
                        logType = 'usage';
                        const usage = msg.usage;
                        const cacheRead = usage.cache_read_input_tokens || 0;
                        const cacheCreate = usage.cache_creation_input_tokens || 0;
                        const inputTokens = usage.input_tokens || 0;
                        const outputTokens = usage.output_tokens || 0;

                        let parts = [`${inputTokens} in`, `${outputTokens} out`];
                        if (cacheRead > 0) parts.push(`${cacheRead} cache`);
                        if (cacheCreate > 0) parts.push(`${cacheCreate} cached`);

                        logContent = `📊 Tokens: ${parts.join(' / ')}`;
                    }
                }
            } else if (event.type === 'user') {
                // Parse user messages (tool results)
                const msg = event.message;
                if (msg && msg.content) {
                    const contents = Array.isArray(msg.content) ? msg.content : [msg.content];

                    for (const item of contents) {
                        if (item.type === 'tool_result') {
                            logType = 'tool';
                            const isError = item.is_error;
                            const contentPreview = item.content ?
                                (item.content.length > 60 ? item.content.substring(0, 60) + '...' : item.content)
                                : '';

                            logContent = `Tool ${item.tool_use_id?.substring(0, 12)}${isError ? ' (error)' : ''}`;
                            if (contentPreview && !isError) {
                                logContent += `: ${contentPreview}`;
                            }
                            break;
                        }
                    }
                }
            } else if (event.type === 'tool_use') {
                logType = 'tool';
                logContent = `🔧 ${event.name}(${JSON.stringify(event.input).substring(0, 100)}...)`;
            } else if (event.type === 'tool_result') {
                logType = 'tool';
                logContent = `✓ Tool completed: ${event.tool_use_id}`;
            } else if (event.type === 'text') {
                logType = 'text';
                logContent = event.text || '';
            } else if (event.type === 'usage') {
                logType = 'usage';
                logContent = `📊 Tokens: ${event.input_tokens} in / ${event.output_tokens} out`;
            } else if (event.type === 'error') {
                logType = 'error';
                logContent = event.error || 'Unknown error';
            } else if (event.type === 'result') {
                logType = 'result';
                logContent = '✅ Task completed';
            } else {
                // Fallback: show raw JSON
                logContent = JSON.stringify(event);
            }

            // Skip empty log entries
            if (!logContent) {
                return;
            }

            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';

            // Store full data for modal
            const logId = 'log_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            logEntry.dataset.fullData = JSON.stringify(data);

            // Render content based on type
            let renderedContent = '';
            if (logType === 'text') {
                // Render markdown for text content
                try {
                    renderedContent = marked.parse(logContent);
                } catch (e) {
                    renderedContent = escapeHtml(logContent);
                }
            } else {
                renderedContent = escapeHtml(logContent);
            }

            // Add TodoWrite list if present
            let todoHtml = '';
            if (toolData && toolData.name === 'TodoWrite' && toolData.input && toolData.input.todos) {
                todoHtml = renderTodoList(toolData.input.todos);
            }

            logEntry.innerHTML = `
                <span class="log-timestamp">${timestamp}</span>
                <span class="log-type ${logType}">${logType}</span>
                <span class="log-content">${renderedContent}${todoHtml}</span>
                <span class="log-info-icon" onclick="showLogDetails('${logId}')" title="View full details">ⓘ</span>
            `;

            logEntry.id = logId;

            container.appendChild(logEntry);

            // Auto-scroll to bottom
            if (autoScroll) {
                container.scrollTop = container.scrollHeight;
            }

            // Keep only last 200 log entries
            while (container.children.length > 200) {
                container.removeChild(container.firstChild);
            }
        }

        function clearLiveLogs() {
            const container = document.getElementById('liveLogsContent');
            container.innerHTML = '<div style="padding: 15px; color: #8b949e; text-align: center;">Waiting for Claude activity...</div>';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLogDetails(logId) {
            const logEntry = document.getElementById(logId);
            if (!logEntry) return;

            const fullData = JSON.parse(logEntry.dataset.fullData);

            // Format JSON with syntax highlighting
            const formatted = JSON.stringify(fullData, null, 2);

            const modal = document.getElementById('logModal');
            const content = document.getElementById('modalLogContent');
            content.querySelector('pre').textContent = formatted;

            modal.classList.add('active');
        }

        function closeLogModal() {
            const modal = document.getElementById('logModal');
            modal.classList.remove('active');
        }

        function closeModalOnOverlay(event) {
            if (event.target.id === 'logModal') {
                closeLogModal();
            }
        }

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLogModal();
            }
        });

        let currentEventCount = 0;
        let currentEventOffset = 0;

        function loadHistory(append = false) {
            const count = 50;
            fetch(`http://localhost:5001/history?count=${count}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.events && data.events.length > 0) {
                        console.log(`Loading ${data.events.length} historical events`);

                        const container = document.getElementById('eventsContainer');

                        if (!append) {
                            // First load - add separator
                            if (container.children.length === 0) {
                                const separator = document.createElement('div');
                                separator.id = 'eventsSeparator';
                                separator.style.cssText = 'padding: 10px; text-align: center; color: #8b949e; border-top: 1px solid #30363d; margin: 10px 0; font-size: 13px;';
                                const total = data.total || data.events.length;
                                currentEventCount = data.events.length;
                                separator.innerHTML = `📜 Showing ${currentEventCount} of ${total} events`;
                                container.appendChild(separator);

                                // Add "Load More" button if there are more events
                                if (data.events.length < total) {
                                    const loadMoreBtn = document.createElement('div');
                                    loadMoreBtn.id = 'loadMoreEvents';
                                    loadMoreBtn.style.cssText = 'padding: 10px; text-align: center; margin: 10px 0;';
                                    loadMoreBtn.innerHTML = '<button onclick="loadMoreEvents()">Load More Events</button>';
                                    container.appendChild(loadMoreBtn);
                                }
                            }

                            // Add historical events in chronological order
                            data.events.forEach(event => {
                                addEvent(event);
                                updateStats(event);
                            });
                        }

                        console.log('History loaded successfully');
                    }
                })
                .catch(error => {
                    console.error('Failed to load history:', error);
                });
        }

        function loadMoreEvents() {
            // Request the next batch
            const count = 50;
            const newCount = currentEventCount + count;

            fetch(`http://localhost:5001/history?count=${newCount}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.events) {
                        const container = document.getElementById('eventsContainer');

                        // Remove old events (except separator and load more button)
                        const separator = document.getElementById('eventsSeparator');
                        const loadMoreBtn = document.getElementById('loadMoreEvents');
                        const children = Array.from(container.children);
                        children.forEach(child => {
                            if (child.id !== 'eventsSeparator' && child.id !== 'loadMoreEvents') {
                                child.remove();
                            }
                        });

                        // Update separator
                        const total = data.total || data.events.length;
                        currentEventCount = data.events.length;
                        if (separator) {
                            separator.innerHTML = `📜 Showing ${currentEventCount} of ${total} events`;
                        }

                        // Remove load more button if we've loaded everything
                        if (data.events.length >= total && loadMoreBtn) {
                            loadMoreBtn.remove();
                        }

                        // Re-add all events
                        data.events.forEach(event => {
                            addEvent(event);
                            updateStats(event);
                        });

                        console.log(`Loaded ${data.events.length} events total`);
                    }
                })
                .catch(error => {
                    console.error('Failed to load more events:', error);
                });
        }

        let currentLogCount = 0;

        function loadClaudeLogsHistory() {
            const count = 100;
            fetch(`http://localhost:5001/claude-logs-history?count=${count}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.logs && data.logs.length > 0) {
                        console.log(`Loading ${data.logs.length} historical Claude logs`);

                        const container = document.getElementById('liveLogsContent');

                        // Clear the "waiting" message
                        if (container.querySelector('[style*="text-align: center"]')) {
                            container.innerHTML = '';
                        }

                        // Add a separator to show where history ends
                        const separator = document.createElement('div');
                        separator.id = 'logsSeparator';
                        separator.style.cssText = 'padding: 8px; text-align: center; color: #6e7681; font-size: 12px; border-bottom: 1px solid #21262d;';
                        const total = data.total || data.logs.length;
                        currentLogCount = data.logs.length;
                        separator.textContent = `📜 Showing ${currentLogCount} of ${total} logs`;
                        container.appendChild(separator);

                        // Add "Load More" button if there are more logs
                        if (data.logs.length < total) {
                            const loadMoreBtn = document.createElement('div');
                            loadMoreBtn.id = 'loadMoreLogs';
                            loadMoreBtn.style.cssText = 'padding: 8px; text-align: center; border-bottom: 1px solid #21262d;';
                            loadMoreBtn.innerHTML = '<button onclick="loadMoreLogs()">Load More Logs</button>';
                            container.appendChild(loadMoreBtn);
                        }

                        // Add historical logs in chronological order
                        data.logs.forEach(logData => {
                            addLiveLog(logData);
                        });

                        console.log('Claude log history loaded successfully');
                    }
                })
                .catch(error => {
                    console.error('Failed to load Claude log history:', error);
                });
        }

        function loadMoreLogs() {
            const count = 100;
            const newCount = currentLogCount + count;

            fetch(`http://localhost:5001/claude-logs-history?count=${newCount}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.logs) {
                        const container = document.getElementById('liveLogsContent');

                        // Remove old logs (except separator and load more button)
                        const separator = document.getElementById('logsSeparator');
                        const loadMoreBtn = document.getElementById('loadMoreLogs');
                        const children = Array.from(container.children);
                        children.forEach(child => {
                            if (child.id !== 'logsSeparator' && child.id !== 'loadMoreLogs') {
                                child.remove();
                            }
                        });

                        // Update separator
                        const total = data.total || data.logs.length;
                        currentLogCount = data.logs.length;
                        if (separator) {
                            separator.textContent = `📜 Showing ${currentLogCount} of ${total} logs`;
                        }

                        // Remove load more button if we've loaded everything
                        if (data.logs.length >= total && loadMoreBtn) {
                            loadMoreBtn.remove();
                        }

                        // Re-add separator
                        if (separator) {
                            container.appendChild(separator);
                        }
                        if (loadMoreBtn && data.logs.length < total) {
                            container.appendChild(loadMoreBtn);
                        }

                        // Re-add all logs
                        data.logs.forEach(logData => {
                            addLiveLog(logData);
                        });

                        console.log(`Loaded ${data.logs.length} logs total`);
                    }
                })
                .catch(error => {
                    console.error('Failed to load more logs:', error);
                });
        }
    </script>

    <!-- Modal for log details -->
    <div id="logModal" class="modal-overlay" onclick="closeModalOnOverlay(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3>Log Details</h3>
                <button class="modal-close" onclick="closeLogModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modalLogContent" class="json-viewer">
                    <pre></pre>
                </div>
            </div>
        </div>
    </div>
</body>
