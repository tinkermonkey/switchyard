services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - orchestrator-net

  orchestrator:
    build: .
    user: "1000:0"  # Run as orchestrator user with docker group (GID 0 on macOS Docker Desktop)
    volumes:
      # Mount the orchestrator code (this is clauditoreum/)
      - ./:/app

      # Mount ONLY the orchestrator parent directory (~/workspace/orchestrator)
      # This directory contains:
      #   - clauditoreum/ (this codebase, mounted above as /app)
      #   - <project-name>/ (managed project checkouts)
      # This ensures orchestrator cannot access sibling directories like ~/workspace/context-studio
      - ..:/workspace

      # Mount SSH key for git operations (individual file to preserve container's SSH config)
      - ~/.ssh/id_ed25519:/home/orchestrator/.ssh/id_ed25519:ro
      # Note: We don't mount ~/.ssh/config or known_hosts to preserve container's SSH setup

      # Mount git config
      - ~/.gitconfig:/home/orchestrator/.gitconfig:ro

      # Mount GitHub App private key directory (optional - accessible by orchestrator user)
      - ~/.orchestrator:/home/orchestrator/.orchestrator:ro

      # Share Docker socket for nested containers if needed
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH}
      - GITHUB_ORG=${GITHUB_ORG}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=INFO
      - CONTEXT7_MCP_URL=https://mcp.context7.com/mcp
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY}
      # Host paths for Docker-in-Docker mounting
      - HOST_WORKSPACE_PATH=${HOME}/workspace/orchestrator
      - HOST_HOME=${HOME}

    depends_on:
      - redis

    networks:
      - orchestrator-net

    working_dir: /app
    command: ["python", "main.py"]

  observability-server:
    build: .
    volumes:
      - ./:/app
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - orchestrator-net
    ports:
      - "5001:5001"
    working_dir: /app
    command: ["python", "-m", "services.observability_server"]

  web-ui:
    build: ./web_ui_v2
    depends_on:
      - observability-server
    networks:
      - orchestrator-net
    ports:
      - "3000:80"


volumes:
  redis_data:

networks:
  orchestrator-net:
    driver: bridge