services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - orchestrator-net

  orchestrator:
    build:
      context: .
      args:
        DOCKER_GID: "${DOCKER_GID:-984}"  # Pass host docker GID to Dockerfile
    # Run as orchestrator user (UID 1000) defined in Dockerfile
    # With rootful Docker, container UID 1000 = host UID 1000 directly (no namespace remapping)
    # This allows file access and Claude Code to run with bypass permissions
    restart: unless-stopped
    volumes:
      # Mount the orchestrator code (this is clauditoreum/)
      - ./:/app

      # Mount ONLY the orchestrator parent directory (~/workspace/orchestrator)
      # This directory contains:
      #   - clauditoreum/ (this codebase, mounted above as /app)
      #   - <project-name>/ (managed project checkouts)
      # This ensures orchestrator cannot access sibling directories like ~/workspace/context-studio
      - ..:/workspace

      # Mount SSH key for git operations (individual file to preserve container's SSH config)
      - ~/.ssh/id_ed25519:/home/orchestrator/.ssh/id_ed25519:ro
      # Note: We don't mount ~/.ssh/config or known_hosts to preserve container's SSH setup

      # Mount git config
      - ~/.gitconfig:/home/orchestrator/.gitconfig:ro

      # Mount GitHub App private key directory (optional - accessible by orchestrator user)
      - ~/.orchestrator:/home/orchestrator/.orchestrator

      # Mount Claude Code config directory for authentication (Linux: ~/.config/claude, macOS: ~/.claude)
      # On macOS, config is in ~/.claude; on Linux it's in ~/.config/claude
      # We mount both to support both platforms (one will be empty/missing on each platform)
      #- ~/.claude:/home/orchestrator/.claude:ro
      #- ~/.config/claude:/home/orchestrator/.config/claude:ro

      # Share Docker socket for nested containers (rootful Docker)
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH}
      - GITHUB_ORG=${GITHUB_ORG}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=INFO
      - CONTEXT7_MCP_URL=https://mcp.context7.com/mcp
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY}
      - RECONCILIATION_FRESHNESS_HOURS=${RECONCILIATION_FRESHNESS_HOURS:-1}
      # Worker pool configuration
      # Set to 1 for single-threaded (default), 2-8 for multi-threaded parallel execution
      # Recommended: 2-3 workers for multi-project deployments
      - ORCHESTRATOR_WORKERS=${ORCHESTRATOR_WORKERS:-1}
      # Host paths for Docker-in-Docker mounting
      # These are intentionally NOT set - the code has correct defaults:
      # - HOST_WORKSPACE_PATH defaults to '/workspace' (the mounted parent dir)
      # - HOST_HOME defaults to $HOME inside the container
      # Setting them from the host's $HOME can cause issues with Snap Docker
      # where $HOME points to /home/user/snap/docker/XXX instead of /home/user

    depends_on:
      - redis

    networks:
      - orchestrator-net

    working_dir: /app
    command: ["python", "main.py"]

  observability-server:
    build: .
    volumes:
      - ./:/app
      - ..:/workspace:ro  # Mount workspace read-only for git branch monitoring
      - /var/run/docker.sock:/var/run/docker.sock
      - ./medic:/medic:ro  # Mount medic reports directory read-only
    environment:
      - REDIS_URL=redis://redis:6379
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH}
    depends_on:
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - orchestrator-net
    ports:
      - "5001:5001"
    working_dir: /app
    command: ["python", "-m", "services.observability_server"]

  web-ui:
    build: ./web_ui
    depends_on:
      - observability-server
    networks:
      - orchestrator-net
    ports:
      - "3000:80"

  log-collector:
    build: .
    volumes:
      - ./:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - LOG_BATCH_SIZE=50
      - LOG_BATCH_TIMEOUT=5.0
    depends_on:
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - orchestrator-net
    working_dir: /app
    command: ["python", "-m", "services.log_collector"]
    restart: unless-stopped

  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: browserless
    environment:
      - CONCURRENT=5
      - MAX_CONCURRENT_SESSIONS=5
      - TIMEOUT=30000
      - ENABLE_DEBUGGER=true
      # Optional: Add token for authentication
      # - TOKEN=your-secure-token-here
    networks:
      - orchestrator-net
    ports:
      - "3080:3000"  # Expose for debugging (web-ui uses 3000)
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./config/elasticsearch/log4j2.properties:/usr/share/elasticsearch/config/log4j2.properties:ro
    networks:
      - orchestrator-net
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  medic-monitor:
    build: .
    volumes:
      - ./:/app
      - /var/run/docker.sock:/var/run/docker.sock  # Docker log access
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - orchestrator-net
    working_dir: /app
    command: ["python", "-m", "services.medic.docker_log_monitor"]
    restart: unless-stopped

  claude-failure-monitor:
    build: .
    volumes:
      - ./:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - orchestrator-net
    working_dir: /app
    command: ["python", "-m", "services.medic.claude_failure_monitor"]
    restart: unless-stopped

  medic-investigator:
    build: .
    volumes:
      - ./:/app
      - ..:/workspace  # Access to orchestrator workspace for projects
      - /var/run/docker.sock:/var/run/docker.sock  # Docker CLI access for logs
      - ./medic:/medic  # Investigation reports directory (inside clauditoreum/)

      # Mount Claude Code config directory for authentication (Linux: ~/.config/claude)
      - ~/.config/claude:/home/orchestrator/.config/claude:ro
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - WORKSPACE_ROOT=/workspace/clauditoreum
      - MEDIC_DIR=/medic
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      medic-monitor:
        condition: service_started
      claude-failure-monitor:
        condition: service_started
    networks:
      - orchestrator-net
    working_dir: /app
    command: ["python", "-m", "services.medic.investigation_orchestrator"]
    restart: unless-stopped

  claude-investigation-orchestrator:
    build: .
    volumes:
      - ./:/app
      - ..:/workspace  # Access to orchestrator workspace for projects
      - /var/run/docker.sock:/var/run/docker.sock  # Docker CLI access
      - ./medic:/medic  # Investigation reports directory (inside clauditoreum/)

      # Mount Claude Code config directory for authentication (Linux: ~/.config/claude)
      - ~/.config/claude:/home/orchestrator/.config/claude:ro
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - WORKSPACE_ROOT=/workspace/clauditoreum
      - MEDIC_DIR=/medic
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      claude-failure-monitor:
        condition: service_started
    networks:
      - orchestrator-net
    working_dir: /app
    command: ["python", "-m", "services.medic.claude_investigation_orchestrator"]
    restart: unless-stopped

