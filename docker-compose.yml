services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - orchestrator-net

  orchestrator:
    build: .
    user: "1000:0"  # Run as orchestrator user with docker group (GID 0 on macOS Docker Desktop)
    volumes:
      # Mount the orchestrator code (this is clauditoreum/)
      - ./:/app

      # Mount ONLY the orchestrator parent directory (~/workspace/orchestrator)
      # This directory contains:
      #   - clauditoreum/ (this codebase, mounted above as /app)
      #   - <project-name>/ (managed project checkouts)
      # This ensures orchestrator cannot access sibling directories like ~/workspace/context-studio
      - ..:/workspace

      # Mount SSH key for git operations (individual file to preserve container's SSH config)
      - ~/.ssh/id_ed25519:/home/orchestrator/.ssh/id_ed25519:ro
      # Note: We don't mount ~/.ssh/config or known_hosts to preserve container's SSH setup

      # Mount git config
      - ~/.gitconfig:/home/orchestrator/.gitconfig:ro

      # Mount GitHub App private key directory (optional - accessible by orchestrator user)
      - ~/.orchestrator:/home/orchestrator/.orchestrator:ro

      # Mount Claude Code data directory for usage tracking
      - ~/.claude:/home/orchestrator/.claude:ro

      # Share Docker socket for nested containers if needed
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH}
      - GITHUB_ORG=${GITHUB_ORG}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=INFO
      - CONTEXT7_MCP_URL=https://mcp.context7.com/mcp
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY}
      # Host paths for Docker-in-Docker mounting
      - HOST_WORKSPACE_PATH=${HOME}/workspace/orchestrator
      - HOST_HOME=${HOME}

    depends_on:
      - redis

    networks:
      - orchestrator-net

    working_dir: /app
    command: ["python", "main.py"]

  observability-server:
    build: .
    volumes:
      - ./:/app
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - orchestrator-net
    ports:
      - "5001:5001"
    working_dir: /app
    command: ["python", "-m", "services.observability_server"]

  web-ui:
    build: ./web_ui_v2
    depends_on:
      - observability-server
    networks:
      - orchestrator-net
    ports:
      - "3000:80"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - orchestrator-net
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pattern-ingestion:
    build: .
    volumes:
      - ./:/app
    environment:
      # Redis (log collection)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Elasticsearch (shared)
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      # Log collector
      - LOG_BATCH_SIZE=50
      - LOG_BATCH_TIMEOUT=5.0
      # Pattern detector
      - PATTERNS_DIR=config/patterns
      - DETECTION_INTERVAL=60
      - LOOKBACK_MINUTES=5
    depends_on:
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - orchestrator-net
    working_dir: /app
    command: ["python", "-m", "services.pattern_ingestion_service"]
    restart: unless-stopped

  pattern-github-processor:
    build: .
    volumes:
      - ./:/app
      - ~/.orchestrator:/home/orchestrator/.orchestrator:ro
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - GITHUB_ORG=${GITHUB_ORG}
      - GITHUB_REPO=orchestrator
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH}
      - GITHUB_PROCESSING_INTERVAL=300
      - GITHUB_DISCUSSION_CATEGORY=Ideas
      - MIN_OCCURRENCES_FOR_DISCUSSION=5
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - orchestrator-net
    working_dir: /app
    command: ["python", "-m", "services.pattern_github_processor_es"]
    restart: unless-stopped

  pattern-analysis:
    build: .
    volumes:
      - ./:/app
    environment:
      # Elasticsearch
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      # Daily Aggregator
      - AGGREGATION_INTERVAL_HOURS=24
      - LOOKBACK_DAYS=7
      # LLM Analyzer
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LLM_ANALYSIS_INTERVAL_HOURS=168
      - MIN_OCCURRENCES_FOR_LLM=20
      - MAX_PATTERNS_PER_LLM_RUN=5
      # Similarity Analyzer
      - SIMILARITY_ANALYSIS_INTERVAL_HOURS=24
      - SIMILARITY_THRESHOLD=0.75
      - MIN_OCCURRENCES_FOR_SIMILARITY=5
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - orchestrator-net
    working_dir: /app
    command: ["python", "-m", "services.pattern_analysis_service"]
    restart: unless-stopped


volumes:
  redis_data:
  elasticsearch_data:

networks:
  orchestrator-net:
    driver: bridge