version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
  
  ngrok:
    image: ngrok/ngrok:latest
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http webhook:3000 --log stdout
    ports:
      - "4040:4040"  # ngrok web UI for monitoring
    networks:
      - orchestrator-net
    depends_on:
      - webhook
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml:ro  # Optional: for advanced configurations
    
  webhook:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    expose:
      - "3000"  # Only exposed internally, not to host
    environment:
      - WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - REDIS_URL=redis://redis:6379
      - NGROK_URL=${NGROK_URL}  # Will be set after first run
    depends_on:
      - redis
    networks:
      - orchestrator-net
    volumes:
      - ./logs:/app/logs

  # context7 runs as SaaS - no local container needed

  serena-mcp:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install uv &&
             uvx --from git+https://github.com/oraios/serena serena start-mcp-server
             --context ide-assistant
             --project /workspace
             --host 0.0.0.0
             --port 3001"
    expose:
      - "3001"
    networks:
      - orchestrator-net
    volumes:
      - ./:/workspace:ro  # Read-only access to orchestrator codebase
      - ../:/workspace:ro  # Read-only access to managed projects (siblings of orchestrator)

  puppeteer-mcp:
    image: modelcontextprotocol/puppeteer:latest
    expose:
      - "3002"
    networks:
      - orchestrator-net
    environment:
      - DISPLAY=:99
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

  orchestrator:
    build: .
    volumes:
      # Mount the orchestrator code
      - ./:/app

      # Mount parent directory for project management (projects will be siblings of orchestrator)
      - ../:/workspace

      # Mount SSH keys for git operations
      - ~/.ssh:/root/.ssh:ro

      # Mount git config
      - ~/.gitconfig:/root/.gitconfig:ro

      # Share Docker socket for nested containers if needed
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ORG=${GITHUB_ORG}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379
      - WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - LOG_LEVEL=INFO
      - CONTEXT7_MCP_URL=https://mcp.context7.com/mcp
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY}
      - SERENA_MCP_URL=http://serena-mcp:3001
      - PUPPETEER_MCP_URL=http://puppeteer-mcp:3002

    depends_on:
      - redis
      - webhook
      - serena-mcp
      - puppeteer-mcp

    networks:
      - orchestrator-net

    working_dir: /app
    command: ["python", "main.py"]


volumes:
  redis_data:

networks:
  orchestrator-net:
    driver: bridge